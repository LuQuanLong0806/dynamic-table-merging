                  if (c.x == null) errors.push(label + ' 缺少 x');
                  if (c.y == null) errors.push(label + ' 缺少 y');
                  if (!c.type) errors.push(label + ' 缺少 type');
                  else if (validTypes.indexOf(c.type) < 0) errors.push(label + ' type "' + c.type + '" 不合法（应为 ' + validTypes.join('/') + '）');
                });
                if (errors.length) {
                  self.importError = '配置校验未通过（共 ' + errors.length + ' 项）：\n' + errors.slice(0, 10).join('\n') + (errors.length > 10 ? '\n...（其余 ' + (errors.length - 10) + ' 项已省略）' : '');
                  self.importing = false;
                  self.$Spin.hide();
                  return;
                }
                // 规范化：补 __uid、规范化 validation/linkage 的 kind 字段
                data.cells.forEach(function (c) {
                  c.__uid = newUid();
                  if (c.validation && c.validation.rules) {
                    c.validation.rules.forEach(inferRuleKind);
                  }
                  if (c.linkage) {
                    c.linkage.forEach(function (lk) {
                      (lk.actions || []).forEach(inferActionKind);
                    });
                  }
                });
                // 软警告：坐标重叠（不阻塞导入，仅提示）
                for (var i = 0; i < data.cells.length; i++) {
                  for (var j = i + 1; j < data.cells.length; j++) {
                    var a = data.cells[i], b = data.cells[j];
                    if (!a.x || !a.y || !b.x || !b.y) continue;
                    var axr = window.DTUtils.parseRange(a.x), ayr = window.DTUtils.parseRange(a.y);
                    var bxr = window.DTUtils.parseRange(b.x), byr = window.DTUtils.parseRange(b.y);
                    if (axr.start === bxr.start && axr.end === bxr.end &&
                        ayr.start === byr.start && ayr.end === byr.end) {
                      overlapWarns.push(a.id + ' 与 ' + b.id);
                    }
                  }
                }
                // 统计：最大列/行 + 类型分布
                var typeCounts = {};
                var maxCol = 0, maxRow = 0;
                data.cells.forEach(function (c) {
                  typeCounts[c.type] = (typeCounts[c.type] || 0) + 1;
                  var xr = window.DTUtils.parseRange(c.x), yr = window.DTUtils.parseRange(c.y);
                  if (xr.end > maxCol) maxCol = xr.end;
                  if (yr.end > maxRow) maxRow = yr.end;
                });
                var summary = Object.keys(typeCounts)
                  .map(function (k) { return k + ':' + typeCounts[k]; })
                  .join('、');
                // 校验通过，关闭 loading 并弹出确认
                self.importing = false;
                self.$Spin.hide();
                self._pendingImport = {
                  title: data.title || '',
                  cells: data.cells,
                  freezeRows: Math.max(0, parseInt(data.freezeRows, 10) || 0),
                  maxCol: maxCol,
                  maxRow: maxRow,
                  summary: summary,
                  overlapWarns: overlapWarns,
                  cellCount: data.cells.length
                };
                if (self.config.cells && self.config.cells.length > 0) {
                  self.$Modal.confirm({
                    title: '确认导入',
                    content: '当前已有 <b>' + self.config.cells.length + '</b> 个单元格配置。导入将<strong>替换</strong>全部现有配置（可 Ctrl+Z 撤销）。<br><br>即将导入：<b>' + data.cells.length + '</b> 个单元格（' + maxCol + ' 列 × ' + maxRow + ' 行）',
                    okText: '确认导入',
                    cancelText: '取消',
                    onOk: function () { self._applyPendingImport(); }
                  });
                } else {
                  self._applyPendingImport();
                }
              } catch (e) {
                self.importError = 'JSON 解析失败：' + e.message;
                self.importing = false;
                self.$Spin.hide();
              }
            }, 50);
          },
          _applyPendingImport: function () {
            var d = this._pendingImport;
            if (!d) return;
            this._pushUndo();
            this.config = { title: d.title, cells: d.cells, freezeRows: d.freezeRows };
            this.gridPad = { cols: 0, rows: 0 };
            this.expandedSet = {};
            this.showImportModal = false;
            this.importText = '';
            this._pendingImport = null;
            this.schedulePreview();
            this.$Message.success({
              content: '已导入 ' + d.cellCount + ' 个单元格（' + d.maxCol + ' 列 × ' + d.maxRow + ' 行；' + d.summary + '）',
              duration: 4
            });
            if (d.overlapWarns && d.overlapWarns.length) {
              this.$Message.warning({
                content: '检测到 ' + d.overlapWarns.length + ' 项警告：' + d.overlapWarns.slice(0, 3).join('；') + (d.overlapWarns.length > 3 ? '...（其余 ' + (d.overlapWarns.length - 3) + ' 项已省略）' : ''),
                duration: 6
              });
            }
          },
          _copyText: function (text) {
            return new Promise(function (resolve, reject) {
              try {
                if (navigator.clipboard) {
                  navigator.clipboard.writeText(text).then(resolve, function () {
                    fallbackCopy(text); resolve();
                  });
                } else {
                  fallbackCopy(text); resolve();
                }
              } catch (e) {
                fallbackCopy(text); resolve();
              }
            });
          }
        }
      });

      // ---------- 序列化辅助 ----------
      function serializeRule(r) {
        var out = {};
        var k = r.kind || 'required';
        if (r.message) out.message = r.message;
        if (k === 'required') {
          out.required = true;
        } else if (k === 'number') {
          out.type = 'number';
          if (r.min != null && r.min !== '') out.min = Number(r.min);
          if (r.max != null && r.max !== '') out.max = Number(r.max);
        } else if (k === 'string') {
          out.type = 'string';
          if (r.min != null && r.min !== '') out.min = Number(r.min);
          if (r.max != null && r.max !== '') out.max = Number(r.max);
        } else if (k === 'array') {
          out.type = 'array';
          if (r.min != null && r.min !== '') out.min = Number(r.min);
          if (r.max != null && r.max !== '') out.max = Number(r.max);
        } else if (k === 'pattern') {
          if (r.pattern) out.pattern = r.pattern;
        } else if (k === 'len') {
          if (r.len != null && r.len !== '') out.len = Number(r.len);
        } else if (k === 'enum') {
          var arr = Array.isArray(r.enum) ? r.enum.slice()
            : String(r.enumStr == null ? '' : r.enumStr).split(',').map(function (s) { return s.trim(); }).filter(Boolean);
          if (arr.length) out.enum = arr;
        } else if (k === 'custom') {
          if (r.custom) out.custom = r.custom;
          if (r.useDepends && r.depends) out.depends = r.depends;
        } else if (k === 'validator') {
          if (r.validator) out.validator = r.validator;
          if (r.useDepends && r.depends) out.depends = r.depends;
        } else if (k === 'depends') {
          out.required = true;
          if (r.depends) out.depends = r.depends;
        }
        return out;
      }

      function serializeAction(a) {
        var out = { type: a.kind };
        if (a.kind === 'setValue') {
          out.target = a.target;
          out.value = a.value != null ? a.value : '';
        } else if (a.kind.indexOf('row') === 0) {
          out.rowTargets = (a.rowTargets || []).filter(function (rt) { return rt.row && rt.cols && rt.cols.length; });
        } else {
          out.target = a.target;
        }
        return out;
      }

      // 兼容三种粘贴格式：
      // 1) 严格 JSON：{"title": "...", "cells": [...]}
      // 2) JS 文件：var MOCK_DATA = {...};（含注释）
      // 3) JS 对象字面量：{title: "...", cells: [...]}（无引号键）
      function parseConfigText(text) {
        // 1. 纯 JSON
        try {
          return JSON.parse(text);
        } catch (e) { /* fallthrough */ }
        // 2. var NAME = {...}; 形式
        var m = text.match(/var\s+([a-zA-Z_$][\w$]*)\s*=/);
        if (m) {
          var name = m[1];
          try {
            /* eslint-disable no-new-func */
            var fn = new Function(text + '; return typeof ' + name + ' !== "undefined" ? ' + name + ' : null;');
            /* eslint-enable no-new-func */
            var data = fn();
            if (data && typeof data === 'object') return data;
          } catch (e) { /* fallthrough */ }
        }
        // 3. 裸对象字面量
        try {
          /* eslint-disable no-new-func */
          var fn2 = new Function('return (' + text + ');');
          /* eslint-enable no-new-func */
          var data2 = fn2();
          if (data2 && typeof data2 === 'object') return data2;
        } catch (e2) { /* fallthrough */ }
        throw new Error('无法识别的内容格式（支持 JSON、var X = {...}、对象字面量）');
      }

      function inferRuleKind(r) {
        if (r.validator) r.kind = 'validator';
        else if (r.custom) r.kind = 'custom';
        else if (r.depends && r.required) r.kind = 'depends';
        else if (r.depends) r.kind = 'custom', r.custom = '';
        else if (r.enum) { r.kind = 'enum'; r.enumStr = (Array.isArray(r.enum) ? r.enum : []).join(','); }
        else if (r.pattern) r.kind = 'pattern';
        else if (r.len != null) r.kind = 'len';
        else if (r.type === 'array') r.kind = 'array';
        else if (r.type === 'string') r.kind = 'string';
        else if (r.type === 'number' && (r.min != null || r.max != null)) r.kind = 'number';
        else r.kind = 'required';
        if (r.depends && (r.kind === 'custom' || r.kind === 'validator')) r.useDepends = true;
      }

      function inferActionKind(a) {
        a.kind = a.type;
        if (a.target) {} // 单目标已存在
        if (a.type && a.type.indexOf('row') === 0) {
          if (!a.rowTargets) a.rowTargets = [];
          a.rowTargets.forEach(function (rt) {
            if (!Array.isArray(rt.cols)) rt.cols = [];
            if (rt.row == null) rt.row = 1;
          });
        }
      }

      function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
      }
    </script>
  </body>
</html>
