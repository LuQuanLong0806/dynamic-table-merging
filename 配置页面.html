<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>动态表格配置器</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/view-design@4.7.0/dist/styles/iview.css"
      onerror="
        this.onerror = null;
        this.href = 'https://unpkg.com/view-design@4.7.0/dist/styles/iview.css';
      "
    />
    <style>
      * {
        box-sizing: border-box;
        font-family: 'Microsoft YaHei', sans-serif;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        background: #f0f2f5;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* ===== 顶部 ===== */
      .app-header {
        background: #fff;
        border-bottom: 1px solid #e8e8e8;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        z-index: 10;
      }
      .app-header .logo {
        font-size: 17px;
        font-weight: bold;
        color: #2a5db0;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .app-header .logo .dot {
        width: 8px;
        height: 8px;
        background: #19be6b;
        border-radius: 50%;
        display: inline-block;
      }
      .app-header .title-input {
        width: 280px;
      }
      .app-header .actions {
        display: flex;
        gap: 6px;
        margin-left: auto;
      }

      /* ===== 主体 ===== */
      .app-main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      /* ===== 预览面板（全宽） ===== */
      .preview-panel--full {
        flex: 1;
        width: 100%;
      }
      .toolbar-divider {
        width: 1px;
        height: 18px;
        background: #e0e0e0;
        margin: 0 6px;
      }
      .state-radio-row {
        padding: 4px 0;
      }
      .state-radio-row .ivu-radio-wrapper {
        margin-right: 16px;
      }
      .template-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .template-card {
        border: 1px solid #e8e8e8;
        border-radius: 6px;
        padding: 14px 10px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        background: #fff;
      }
      .template-card:hover {
        border-color: #2d8cf0;
        background: #f0f7ff;
        transform: translateY(-1px);
        box-shadow: 0 2px 8px rgba(45, 140, 240, 0.15);
      }
      .template-card .template-icon {
        font-size: 28px;
        line-height: 1;
        margin-bottom: 6px;
      }
      .template-card .template-name {
        font-size: 13px;
        font-weight: 600;
        color: #333;
        margin-bottom: 4px;
      }
      .template-card .template-desc {
        font-size: 11px;
        color: #888;
        line-height: 1.4;
      }
      .stat-chip {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        font-size: 12px;
        color: #515a6e;
        background: #f5f7fa;
        border-radius: 10px;
        border: 1px solid #e8eaec;
      }
      .stat-chip.stat-warn {
        color: #ed4014;
        background: #fff1f0;
        border-color: #ffccc7;
      }

      .cell-list {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }
      .cell-list--drawer {
        padding: 4px 0;
      }
      .list-drawer-toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 0 12px;
        border-bottom: 1px solid #e8e8e8;
        margin-bottom: 12px;
      }
      .list-drawer-toolbar .spacer { flex: 1; }
      .empty-state {
        padding: 80px 20px;
        text-align: center;
        color: #999;
      }
      .empty-state .icon {
        font-size: 48px;
        color: #d9d9d9;
        margin-bottom: 12px;
      }

      /* ===== 单元格卡片 ===== */
      .cell-card {
        background: #fff;
        border: 1px solid #e8e8e8;
        border-radius: 6px;
        margin-bottom: 8px;
        transition: box-shadow 0.2s, border-color 0.2s;
      }
      .cell-card:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }
      .cell-card.expanded {
        border-color: #2a5db0;
        box-shadow: 0 2px 10px rgba(42, 93, 176, 0.12);
      }
      .cell-card.has-error {
        border-color: #ffccc7;
      }
      .cell-card.has-error.expanded {
        border-color: #ed4014;
      }
      .cell-card.flash {
        animation: card-flash 1.4s ease-out;
      }
      @keyframes card-flash {
        0%   { box-shadow: 0 0 0 0 rgba(25,190,107,0.0); border-color:#2a5db0; }
        15%  { box-shadow: 0 0 0 6px rgba(25,190,107,0.55); border-color:#19be6b; }
        100% { box-shadow: 0 0 0 0 rgba(25,190,107,0.0); border-color:#2a5db0; }
      }
      /* 抽屉里的卡片：去除折叠头部动画，body 总展开 */
      .edit-drawer .cell-card { margin-bottom: 0; }
      .edit-drawer .cell-card .cell-toggle { display: none; }
      .edit-drawer .cell-card .cell-header { cursor: default; background: #f5f7fa; }
      .edit-drawer .ivu-drawer-body { padding: 12px; background: #fafafa; }
      .cell-header {
        display: flex;
        align-items: center;
        padding: 8px 12px;
        cursor: pointer;
        gap: 8px;
        user-select: none;
      }
      .cell-toggle {
        color: #999;
        transition: transform 0.2s;
        width: 14px;
        text-align: center;
        font-size: 12px;
      }
      .cell-card.expanded .cell-toggle {
        transform: rotate(90deg);
        color: #2a5db0;
      }
      .cell-id-tag {
        background: #e6f0ff;
        color: #2a5db0;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
        font-family: Consolas, monospace;
        flex-shrink: 0;
      }
      .cell-id-tag.duplicate {
        background: #fff1f0;
        color: #cf1322;
      }
      .cell-id-tag.empty {
        background: #fff7e6;
        color: #d46b08;
      }
      .cell-type-tag {
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        color: #fff;
        flex-shrink: 0;
        line-height: 1.4;
      }
      .cell-type-tag.label {
        background: #888;
      }
      .cell-type-tag.text {
        background: #2db7f5;
      }
      .cell-type-tag.input {
        background: #19be6b;
      }
      .cell-type-tag.number {
        background: #ed4014;
      }
      .cell-type-tag.select {
        background: #ff9900;
      }
      .cell-type-tag.radio {
        background: #5cadff;
      }
      .cell-type-tag.checkbox {
        background: #6c5ce7;
      }
      .cell-type-tag.date {
        background: #00b894;
      }
      .cell-type-tag.upload {
        background: #fd79a8;
      }
      .cell-type-tag.formula {
        background: #e17055;
      }
      .cell-coord {
        color: #888;
        font-size: 12px;
        font-family: Consolas, monospace;
        flex-shrink: 0;
        background: #f5f5f5;
        padding: 2px 6px;
        border-radius: 3px;
      }
      .cell-preview {
        color: #555;
        font-size: 12px;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }
      .cell-actions {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
      }
      .cell-actions .ivu-btn {
        padding: 0 8px;
        height: 24px;
        line-height: 22px;
        font-size: 12px;
      }
      .cell-body {
        padding: 12px 16px 14px;
        border-top: 1px solid #f0f0f0;
        background: #fcfcfd;
      }
      .field-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px 12px;
      }
      .field-grid .full {
        grid-column: 1 / -1;
      }
      .field-grid .span2 {
        grid-column: span 2;
      }
      .field-group {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px dashed #e8e8e8;
      }
      .field-group-title {
        font-size: 13px;
        font-weight: bold;
        color: #2a5db0;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .field-group-title .badge-count {
        background: #e6f0ff;
        color: #2a5db0;
        padding: 0 6px;
        border-radius: 8px;
        font-size: 11px;
        line-height: 16px;
      }
      .field-group-title .add-btn {
        margin-left: auto;
      }

      /* ===== 预览面板 ===== */
      .preview-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #f5f7fa;
        overflow: hidden;
        min-width: 0;
      }
      .preview-toolbar {
        padding: 8px 16px;
        background: #fff;
        border-bottom: 1px solid #e8e8e8;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .preview-toolbar .spacer {
        flex: 1;
      }
      .preview-toolbar .auto-tip {
        font-size: 12px;
        color: #888;
      }
      .preview-frame-wrap {
        flex: 1;
        overflow: hidden;
        padding: 12px;
        position: relative;
      }
      #previewFrame {
        width: 100%;
        height: 100%;
        border: 1px solid #e8e8e8;
        border-radius: 4px;
        background: #fff;
      }
      .preview-error {
        position: absolute;
        top: 12px;
        left: 12px;
        right: 12px;
        bottom: 12px;
        background: rgba(255, 245, 245, 0.97);
        color: #cf1322;
        padding: 28px;
        border-radius: 4px;
        border: 1px solid #ffccc7;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        text-align: center;
        font-size: 13px;
        line-height: 1.6;
        overflow: auto;
      }
      .preview-error-icon {
        font-size: 36px;
      }
      .preview-error-text {
        max-width: 480px;
      }

      /* ===== 子列表编辑器（options/rules/actions） ===== */
      .sub-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .sub-item {
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 6px;
        background: #fff;
        border: 1px solid #f0f0f0;
        border-radius: 4px;
      }
      .sub-item .row-grow {
        flex: 1;
        display: flex;
        gap: 4px;
        align-items: center;
        min-width: 0;
      }
      .sub-item .row-grow .ivu-input-wrapper,
      .sub-item .row-grow .ivu-select,
      .sub-item .row-grow .ivu-input-number,
      .sub-item .row-grow .ivu-date-picker {
        flex: 1;
        min-width: 0;
      }
      .sub-item .sub-remove {
        flex-shrink: 0;
      }
      .sub-item-vertical {
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
      }
      .sub-item-vertical .row-grow {
        width: 100%;
      }
      .target-picker {
        display: flex;
        gap: 4px;
        align-items: center;
        flex-wrap: wrap;
      }
      .target-picker .target-id {
        flex: 1;
        min-width: 120px;
      }
      .target-picker .target-act {
        width: 100px;
      }
      .target-picker .target-val {
        flex: 1;
        min-width: 80px;
      }

      .row-target-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-top: 4px;
      }
      .row-target-item {
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 4px 6px;
        background: #f9f9f9;
        border-radius: 3px;
        font-size: 12px;
      }
      .row-target-item .row-num {
        width: 80px;
        flex-shrink: 0;
      }
      .row-target-item .cols-input {
        flex: 1;
      }
      .row-target-item .sub-remove {
        flex-shrink: 0;
      }

      /* ===== 表达式辅助 ===== */
      .expr-hint {
        margin-top: 4px;
        font-size: 11px;
        color: #999;
      }
      .expr-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 4px;
      }
      .expr-chip {
        background: #f0f5ff;
        color: #2a5db0;
        padding: 1px 6px;
        border-radius: 10px;
        font-size: 11px;
        cursor: pointer;
        font-family: Consolas, monospace;
        border: 1px solid #d6e4ff;
        transition: background 0.15s;
      }
      .expr-chip:hover {
        background: #d6e4ff;
      }
      .expr-chip.tpl {
        background: #f6ffed;
        color: #389e0d;
        border-color: #b7eb8f;
      }
      .expr-chip.tpl:hover {
        background: #b7eb8f;
      }

      /* ===== JSON 弹窗 ===== */
      .json-modal-textarea .ivu-input {
        font-family: Consolas, monospace;
        font-size: 12px;
      }

      .size-mini .ivu-btn {
        padding: 0 8px;
        height: 22px;
        line-height: 20px;
        font-size: 11px;
      }

      /* 滚动条美化 */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.15);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.3);
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!-- ==================== 主应用模板 ==================== -->
    <script type="text/x-template" id="app-tpl">
      <div class="app-root" style="display:flex;flex-direction:column;height:100vh;">
        <!-- 顶部 -->
        <header class="app-header">
          <div class="logo"><span class="dot"></span>动态表格配置器</div>
          <i-input
            v-model="config.title"
            placeholder="表格标题（对应 title 字段）"
            class="title-input"
            @on-change="schedulePreview"
          />
          <div class="actions">
            <i-button type="primary" @click="showTemplateModal = true">+ 添加单元格</i-button>
            <i-button @click="listDrawerOpen = true">📋 单元格列表</i-button>
            <i-button @click="showImportModal = true">导入 JSON</i-button>
            <i-button type="primary" @click="openExport">导出 JSON</i-button>
            <i-button @click="copyJSON">复制 JSON</i-button>
            <i-button @click="loadSample">载入示例</i-button>
            <i-button @click="confirmClear">清空</i-button>
          </div>
        </header>

        <!-- 主体：预览占满全宽 -->
        <main class="app-main">
          <section class="preview-panel preview-panel--full">
            <div class="preview-toolbar">
              <span class="auto-tip">自动预览</span>
              <i-switch v-model="autoPreview" size="small" @on-change="onAutoToggle" />
              <span class="toolbar-divider"></span>
              <span class="auto-tip">视角</span>
              <radio-group v-model="previewMode" size="small" @on-change="onPreviewModeChange" type="button">
                <radio label="portal"><span>门户端</span></radio>
                <radio label="platform"><span>管理端</span></radio>
              </radio-group>
              <span class="spacer"></span>
              <span class="stat-chip">单元格 {{config.cells.length}}</span>
              <span class="stat-chip">X {{maxX || '-'}}</span>
              <span class="stat-chip">Y {{maxY || '-'}}</span>
              <tooltip placement="bottom" transfer v-if="duplicateIds.length">
                <span class="stat-chip stat-warn">重复 {{duplicateIds.length}}</span>
                <div slot="content" style="white-space:normal;max-width:260px;">
                  <div style="font-weight:600;margin-bottom:4px;">重复的 ID:</div>
                  <div v-for="id in duplicateIds" :key="id" style="line-height:1.6;">• {{ id }}</div>
                </div>
              </tooltip>
              <span class="stat-chip stat-warn" v-if="emptyIdCount">缺ID {{emptyIdCount}}</span>
              <i-button size="small" @click="refreshPreview">刷新预览</i-button>
              <i-button size="small" @click="openInNewWindow">新窗口</i-button>
              <i-button size="small" @click="exportFile">下载 JSON</i-button>
            </div>
            <div class="preview-frame-wrap">
              <iframe id="previewFrame" frameborder="0"></iframe>
              <div v-if="previewError" class="preview-error">
                <div class="preview-error-icon">⚠</div>
                <div class="preview-error-text">{{previewError}}</div>
                <i-button size="small" @click="previewError = ''; refreshPreview()">重试</i-button>
              </div>
            </div>
          </section>
        </main>

        <!-- 编辑抽屉：点击徽章打开 -->
        <drawer
          :value="editDrawerOpen"
          @on-close="closeEditDrawer"
          :width="520"
          :title="editDrawerTitle"
          :mask="true"
          :transfer="true"
          class-name="edit-drawer"
        >
          <div v-if="!editDrawerCell" style="padding:24px;color:#999;text-align:center;">
            单元格已删除
          </div>
          <cell-card
            v-else
            :cell="editDrawerCell"
            :index="editDrawerIndex"
            :total="config.cells.length"
            :all-cells="config.cells"
            :is-duplicate="duplicateIds.indexOf(editDrawerCell.id) >= 0"
            :expanded-set="expandedSet"
            @toggle="onToggle"
            @remove="onEditRemove"
            @move-up="onEditMove(-1)"
            @move-down="onEditMove(1)"
            @duplicate="onEditDuplicate"
            @change="schedulePreview"
          ></cell-card>
        </drawer>

        <!-- 列表抽屉：管理所有单元格 -->
        <drawer
          v-model="listDrawerOpen"
          :width="560"
          title="单元格列表"
          :transfer="true"
          class-name="list-drawer"
        >
          <div class="list-drawer-toolbar">
            <i-button size="small" type="primary" @click="addCell">+ 添加</i-button>
            <i-button size="small" @click="toggleAll(true)">全展开</i-button>
            <i-button size="small" @click="toggleAll(false)">全折叠</i-button>
            <span class="spacer"></span>
            <span style="font-size:12px;color:#888;">点击卡片标题展开/收起；点徽章上的 ⚙ 直接编辑</span>
          </div>
          <div class="cell-list cell-list--drawer">
            <div v-if="!config.cells.length" class="empty-state">
              <div class="icon">▣</div>
              <div>暂无单元格，点击"+ 添加"或顶部"载入示例"开始</div>
            </div>
            <cell-card
              v-for="(cell, i) in config.cells"
              :key="cell.__uid"
              :cell="cell"
              :index="i"
              :total="config.cells.length"
              :all-cells="config.cells"
              :is-duplicate="duplicateIds.indexOf(cell.id) >= 0"
              :expanded-set="expandedSet"
              @toggle="onToggle"
              @remove="removeCell"
              @move-up="moveUp"
              @move-down="moveDown"
              @duplicate="duplicateCell"
              @change="schedulePreview"
            ></cell-card>
          </div>
        </drawer>

        <!-- 导入弹窗 -->
        <modal
          v-model="showImportModal"
          title="导入 JSON"
          width="700"
          :mask-closable="false"
          ok-text="导入"
          cancel-text="取消"
          @on-ok="doImport"
        >
          <i-input
            v-model="importText"
            type="textarea"
            :rows="18"
            placeholder='粘贴 JSON，格式：{"title":"...","cells":[...]}'
            class="json-modal-textarea"
          />
          <div v-if="importError" style="color:#ed4014;margin-top:8px;font-size:12px;">{{importError}}</div>
        </modal>

        <!-- 导出弹窗 -->
        <modal v-model="showExportModal" title="导出 JSON" width="700" footer-hide>
          <div style="margin-bottom:8px;display:flex;gap:8px;align-items:center;">
            <i-button size="small" @click="copyExport">复制</i-button>
            <i-button size="small" @click="exportFile">下载</i-button>
            <i-switch v-model="minifyExport" size="small" />
            <span style="font-size:12px;color:#888;">压缩为一行</span>
            <span style="flex:1"></span>
            <span style="font-size:12px;color:#888;">{{exportSize}}</span>
          </div>
          <i-input
            :value="exportText"
            type="textarea"
            :rows="22"
            readonly
            class="json-modal-textarea"
          />
        </modal>

        <!-- 模板选择弹窗 -->
        <modal
          v-model="showTemplateModal"
          title="选择单元格模板"
          width="640"
          :mask-closable="true"
          footer-hide
        >
          <div class="template-grid">
            <div
              v-for="t in cellTemplates"
              :key="t.key"
              class="template-card"
              @click="addFromTemplate(t)"
            >
              <div class="template-icon">{{t.icon}}</div>
              <div class="template-name">{{t.name}}</div>
              <div class="template-desc">{{t.desc}}</div>
            </div>
          </div>
          <div style="margin-top:12px;font-size:12px;color:#888;text-align:center;">
            创建后会自动定位到下一个空位（x:1, y:{{maxY + 1}}），可在抽屉里改坐标
          </div>
        </modal>
      </div>
    </script>

    <!-- ==================== 单元格卡片模板 ==================== -->
    <script type="text/x-template" id="cell-card-tpl">
      <div class="cell-card" :class="{ expanded: isExpanded, 'has-error': isDuplicate || !cell.id }"
           :data-cell-id="cell.id">
        <div class="cell-header" @click="$emit('toggle', cell.__uid)">
          <span class="cell-toggle">▶</span>
          <span class="cell-id-tag" :class="{ duplicate: isDuplicate, empty: !cell.id }">

          <span class="cell-type-tag" :class="cell.type">{{typeLabel}}</span>
          <span class="cell-coord">x:{{cell.x}} y:{{cell.y}}</span>
          <span class="cell-preview" v-html="previewText"></span>
          <span class="cell-actions" @click.stop>
            <i-button size="small" @click="$emit('move-up', index)" :disabled="index === 0">↑</i-button>
            <i-button size="small" @click="$emit('move-down', index)" :disabled="index === total - 1">↓</i-button>
            <i-button size="small" @click="$emit('duplicate', index)">复制</i-button>
            <i-button size="small" type="error" ghost @click="$emit('remove', index)">删</i-button>
          </span>
        </div>

        <div class="cell-body" v-show="isExpanded" @change="$emit('change')" @input="$emit('change')">
          <!-- 基础字段 -->
          <div class="field-grid">
            <div>
              <label class="field-label">ID</label>
              <i-input v-model="cell.id" size="small" placeholder="唯一标识，如 h1 / c8_benchmark" />
            </div>
            <div>
              <label class="field-label">类型 type</label>
              <i-select v-model="cell.type" size="small" @on-change="onTypeChange">
                <i-option v-for="t in types" :value="t.v" :key="t.v">{{t.l}}</i-option>
              </i-select>
            </div>
            <div>
              <label class="field-label">&nbsp;</label>
              <div style="font-size:11px;color:#888;padding-top:6px;">{{typeHint}}</div>
            </div>
            <div>
              <label class="field-label">列坐标 x</label>
              <i-input v-model="cell.x" size="small" placeholder="如 1 或 3,5（合并多列）" />
            </div>
            <div>
              <label class="field-label">行坐标 y</label>
              <i-input v-model="cell.y" size="small" placeholder="如 1 或 1,2（合并多行）" />
            </div>
            <div>
              <label class="field-label">初始值 value</label>
              <i-input v-model="cell.value" size="small" placeholder="可选" />
            </div>
            <div class="full">
              <label class="field-label">显示内容 content（支持 HTML）</label>
              <i-input v-model="cell.content" type="textarea" :rows="2" size="small" placeholder="label/text 显示的文本；select/radio 的提示文字" />
            </div>
            <div class="full" v-if="hasPlaceholder">
              <label class="field-label">占位提示 placeholder</label>
              <i-input v-model="cell.placeholder" size="small" placeholder="输入框/数字框的占位提示" />
            </div>
            <div v-if="cell.type === 'label' || cell.type === 'text'">
              <label class="field-label">溢出隐藏 clampLines</label>
              <input-number v-model="cell.clampLines" size="small" :min="0" :step="1" placeholder="0" style="width:100%" />
              <div style="font-size:11px;color:#888;padding-top:2px;">0 或空 = 全部显示；N = 截断到 N 行（鼠标悬停看完整）</div>
            </div>
          </div>

          <!-- 类型相关 -->
          <!-- options -->
          <div class="field-group" v-if="hasOptions">
            <div class="field-group-title">
              选项 options
              <span class="badge-count">{{(cell.options || []).length}}</span>
              <i-button class="add-btn" size="small" type="primary" ghost @click="addOption">+ 添加选项</i-button>
            </div>
            <div class="sub-list">
              <div class="sub-item" v-for="(opt, i) in (cell.options || [])" :key="i">
                <div class="row-grow">
                  <i-input v-model="opt.label" size="small" placeholder="显示文字" />
                  <i-input v-model="opt.value" size="small" placeholder="值 value" style="max-width:140px;" />
                </div>
                <i-button class="sub-remove" size="small" type="error" ghost @click="removeOption(i)">×</i-button>
              </div>
              <div v-if="!(cell.options && cell.options.length)" style="color:#999;font-size:12px;">尚未配置选项</div>
            </div>
          </div>

          <!-- formula -->
          <div class="field-group" v-if="cell.type === 'formula'">
            <div class="field-group-title">公式 calculationFormula</div>

            <div class="expr-chips">
              <span class="expr-chip tpl" @click="insertFormula('SUM()')">SUM()</span>
              <span class="expr-chip tpl" @click="insertFormula('AVG()')">AVG()</span>
              <span class="expr-chip tpl" @click="insertFormula('MIN()')">MIN()</span>
              <span class="expr-chip tpl" @click="insertFormula('CALC_SCORE')">CALC_SCORE</span>
              <span class="expr-chip tpl" @click="insertFormula('CALC()')">CALC()</span>
            </div>
            <div class="expr-hint">单元格 id 可在预览徽章或列表抽屉里查看。CALC 内可用 Math.max/Math.round/三元表达式。</div>
          </div>

          <!-- upload -->
          <div class="field-group" v-if="cell.type === 'upload'">
            <div class="field-group-title">上传配置</div>
            <div class="field-grid">
              <div>
                <label class="field-label">允许格式 accept</label>
                <i-input v-model="cell.accept" size="small" placeholder=".pdf,.jpg,.png" />
              </div>
              <div>
                <label class="field-label">最大体积 maxSize(MB)</label>
                <input-number v-model="cell.maxSize" size="small" :min="0" :step="1" style="width:100%" />
              </div>
            </div>
          </div>

          <!-- 校验 validation -->
          <div class="field-group" v-if="hasValidation">
            <div class="field-group-title">
              校验规则 validation.rules
              <span class="badge-count">{{(cell.validation && cell.validation.rules || []).length}}</span>
              <i-button class="add-btn" size="small" type="primary" ghost @click="addRule">+ 添加规则</i-button>
            </div>
            <div class="sub-list">
              <div class="sub-item sub-item-vertical" v-for="(r, i) in validationRules" :key="i">
                <div class="row-grow">
                  <i-select v-model="r.kind" size="small" style="width:140px;flex:0 0 140px;" @on-change="onRuleKindChange(r)">
                    <i-option value="required">必填 required</i-option>
                    <i-option value="number">数值范围 min/max</i-option>
                    <i-option value="string">长度 min/max</i-option>
                    <i-option value="pattern">正则 pattern</i-option>
                    <i-option value="len">定长 len</i-option>
                    <i-option value="array">数组长度 array</i-option>
                    <i-option value="enum">枚举 enum</i-option>
                    <i-option value="custom">自定义 custom 表达式</i-option>
                    <i-option value="validator">validator 函数体</i-option>
                    <i-option value="depends">条件必填 depends</i-option>
                  </i-select>
                  <i-input v-model="r.message" size="small" placeholder="错误提示文字" style="flex:1;" />
                  <i-button class="sub-remove" size="small" type="error" ghost @click="removeRule(i)">×</i-button>
                </div>
                <div class="row-grow" v-if="r.kind === 'number' || r.kind === 'string' || r.kind === 'array'">
                  <input-number v-model="r.min" size="small" placeholder="min" style="flex:1;" />
                  <input-number v-model="r.max" size="small" placeholder="max" style="flex:1;" />
                </div>
                <div class="row-grow" v-if="r.kind === 'enum'">
                  <i-input v-model="r.enumStr" size="small" placeholder='枚举值，逗号分隔，如 A,B,C' style="flex:1;" @on-change="syncEnum(r)" />
                </div>
                <div class="row-grow" v-if="r.kind === 'pattern'">
                  <i-input v-model="r.pattern" size="small" placeholder='如 ^\d+$' style="flex:1;" />
                </div>
                <div class="row-grow" v-if="r.kind === 'len'">
                  <input-number v-model="r.len" size="small" placeholder="长度" style="flex:1;" />
                </div>
                <div class="row-grow" v-if="r.kind === 'custom'">
                  <i-input v-model="r.custom" size="small" placeholder='表达式，如 value >= bm && value <= bl' style="flex:1;" />
                </div>
                <div class="row-grow" v-if="r.kind === 'validator'">
                  <i-input v-model="r.validator" type="textarea" :rows="2" size="small" placeholder='函数体，参数 (value, fm, extra)，return true 校验通过' style="flex:1;" />
                </div>
                <div class="row-grow" v-if="r.kind === 'depends'">
                  <i-input v-model="r.depends" size="small" placeholder='条件表达式，如 bm_r42 != null' style="flex:1;" />
                </div>
                <div class="row-grow" v-if="r.kind === 'custom' || r.kind === 'validator'">
                  <i-checkbox v-model="r.useDepends">附加条件</i-checkbox>
                  <i-input v-show="r.useDepends" v-model="r.depends" size="small" placeholder="depends 表达式" style="flex:1;" />
                </div>
              </div>
              <div v-if="!validationRules.length" style="color:#999;font-size:12px;">尚未配置校验规则</div>
            </div>
          </div>

          <!-- 联动 linkage -->
          <div class="field-group" v-if="hasLinkage">
            <div class="field-group-title">
              联动 linkage
              <span class="badge-count">{{(cell.linkage || []).length}}</span>

            </div>
            <div class="sub-list">
              <div class="sub-item sub-item-vertical" v-for="(lk, li) in (cell.linkage || [])" :key="li">
                <div class="row-grow">
                  <span style="font-size:12px;color:#888;flex-shrink:0;">当选择</span>
                  <i-select v-model="lk.trigger" size="small" style="flex:1;" :placeholder="(cell.options && cell.options.length) ? '选择 trigger' : '先配置 options'">
                    <i-option v-for="opt in (cell.options || [])" :value="opt.value" :key="opt.value">{{opt.label}} ({{opt.value}})</i-option>
                  </i-select>
                  <span style="font-size:12px;color:#888;flex-shrink:0;">时执行</span>
                  <i-button class="sub-remove" size="small" type="error" ghost @click="removeLinkage(li)">×</i-button>
                </div>
                <div class="sub-list" style="padding-left:12px;">
                  <div class="sub-item" v-for="(a, ai) in lk.actions" :key="ai">
                    <div class="row-grow target-picker">
                      <i-select v-model="a.kind" size="small" class="target-act" @on-change="onActionKindChange(a)">
                        <i-option value="enable">启用 enable</i-option>
                        <i-option value="disable">禁用 disable</i-option>
                        <i-option value="show">显示 show</i-option>
                        <i-option value="hide">隐藏 hide</i-option>
                        <i-option value="clear">清空 clear</i-option>
                        <i-option value="setValue">设置值 setValue</i-option>
                        <i-option value="rowEnable">行启用 rowEnable</i-option>
                        <i-option value="rowDisable">行禁用 rowDisable</i-option>
                        <i-option value="rowClear">行清空 rowClear</i-option>
                      </i-select>
                      <i-select v-if="!a.kind || !a.kind.startsWith('row')" v-model="a.target" size="small" filterable class="target-id" placeholder="选择目标控件">
                        <i-option v-for="c in idChips" :value="c.id" :key="c.id">{{c.id}} ({{c.type}})</i-option>
                      </i-select>
                      <i-input v-if="a.kind === 'setValue'" v-model="a.value" size="small" class="target-val" placeholder="要设置的值" />
                    </div>
                    <i-button class="sub-remove" size="small" type="error" ghost @click="removeAction(li, ai)">×</i-button>
                  </div>
                </div>
                <!-- rowTargets 嵌套（当 actions 中有 row* 类型时展示） -->
                <div v-for="(a, ai) in lk.actions" :key="'rt-'+ai" v-if="a.kind && a.kind.startsWith('row')">
                  <div style="font-size:12px;color:#888;margin:6px 0 4px 12px;">「{{a.kind}}」行绑定 rowTargets：</div>
                  <div class="row-target-list" style="padding-left:12px;">
                    <div class="row-target-item" v-for="(rt, ri) in (a.rowTargets || [])" :key="ri">
                      <input-number v-model="rt.row" size="small" :min="1" class="row-num" placeholder="行号" />
                      <i-select v-model="rt.cols" size="small" multiple filterable class="cols-input" placeholder="选择该行被作用的控件">
                        <i-option v-for="c in idChips" :value="c.id" :key="c.id">{{c.id}} ({{c.type}})</i-option>
                      </i-select>
                      <i-button class="sub-remove" size="small" type="error" ghost @click="removeRowTarget(a, ri)">×</i-button>
                    </div>
                  </div>
                  <div style="padding-left:12px;margin-top:4px;">
                    <i-button size="small" @click="addRowTarget(a)">+ 添加行</i-button>
                  </div>
                </div>
                <div style="padding-left:12px;margin-top:4px;">
                  <i-button size="small" @click="addAction(lk)">+ 添加动作</i-button>
                </div>
              </div>
              <div v-if="!(cell.linkage && cell.linkage.length)" style="color:#999;font-size:12px;">尚未配置联动</div>
            </div>
          </div>

          <!-- 状态开关（4 选 1） -->
          <div class="field-group">
            <div class="field-group-title">
              状态
              <span style="font-size:11px;color:#888;font-weight:normal;margin-left:6px;">单选：只可同时启用一种</span>
            </div>
            <div class="state-radio-row">
              <radio-group :value="visibilityState" @on-change="setVisibilityState">
                <radio label="normal"><span>正常</span></radio>
                <radio label="disabled"><span>只读 disabled</span></radio>
                <radio label="portalHide"><span>门户端隐藏 portalHide</span></radio>

              </radio-group>
            </div>
            <div style="margin-top:6px;">
              <i-checkbox :value="!!cell._hidden" @on-change="v => toggleFlag('_hidden', v)">

              </i-checkbox>
            </div>
          </div>
        </div>
      </div>
    </script>

        { key: 'checkbox',icon: '☑️', name: '多选题',       desc: '多选，值为数组', build: function (id, x, y) { return { id: id, type: 'checkbox', x: x, y: y, content: '', options: [ { value: 'a', label: '选项 A' }, { value: 'b', label: '选项 B' } ] }; } },

      ];

      var uidSeed = 0;
      function newUid() { return 'c' + (++uidSeed) + '_' + Date.now().toString(36); }

      // 生成默认 cell
      function makeCell(partial) {
        var cell = Object.assign(
          {
            __uid: newUid(),
            id: '',
            x: '1',
            y: '1',
            type: 'text',
            content: ''
          },
          partial || {}
        );
        return cell;
      }

      // cell-card 组件
      Vue.component('cell-card', {
        template: '#cell-card-tpl',
        props: {
          cell: Object,
          index: Number,
          total: Number,
          allCells: Array,
          isDuplicate: Boolean,
          expandedSet: Object
        },
        data: function () {
          return { types: TYPE_LIST };
        },
        computed: {
          isExpanded: function () {
            return !!this.expandedSet[this.cell.__uid];
          },
          visibilityState: function () {
            if (this.cell.disabled) return 'disabled';
            if (this.cell.portalHide) return 'portalHide';
            if (this.cell.platformHide) return 'platformHide';
            return 'normal';
          },
          typeLabel: function () {
            return TYPE_LABELS[this.cell.type] || this.cell.type;
          },
          typeHint: function () {
            return TYPE_HINTS[this.cell.type] || '';
          },
          previewText: function () {
            var c = this.cell.content || '';
            return c.replace(/<[^>]+>/g, '').slice(0, 60);
          },
          hasPlaceholder: function () {
            return ['input', 'number'].indexOf(this.cell.type) >= 0;
          },
          hasOptions: function () {
            return ['select', 'radio', 'checkbox'].indexOf(this.cell.type) >= 0;
          },
          hasValidation: function () {
            return ['input', 'number', 'select', 'radio', 'checkbox', 'date', 'upload'].indexOf(this.cell.type) >= 0;
          },
          hasLinkage: function () {
            return ['select', 'radio'].indexOf(this.cell.type) >= 0;
          },
          idChips: function () {
            return (this.allCells || [])
              .filter(function (c) { return c.id; })
              .map(function (c) { return { id: c.id, type: c.type }; });
          },
          validationRules: function () {
            if (!this.cell.validation) this.$set(this.cell, 'validation', { rules: [] });
            if (!this.cell.validation.rules) this.$set(this.cell.validation, 'rules', []);
            return this.cell.validation.rules;
          }
        },
        methods: {
          onTypeChange: function () {
            // 类型切换时保证必要字段
            if (this.hasOptions && !this.cell.options) {
              this.$set(this.cell, 'options', []);
            }
            if (this.cell.type === 'formula' && !this.cell.calculationFormula) {
              this.$set(this.cell, 'calculationFormula', '');
            }
            this.$emit('change');
          },
          addOption: function () {
            if (!this.cell.options) this.$set(this.cell, 'options', []);
            this.cell.options.push({ label: '', value: '' });
            this.$emit('change');
          },
          removeOption: function (i) {
            this.cell.options.splice(i, 1);
            this.$emit('change');
          },
          addRule: function () {
            if (!this.cell.validation) this.$set(this.cell, 'validation', { rules: [] });
            if (!this.cell.validation.rules) this.$set(this.cell.validation, 'rules', []);
            this.cell.validation.rules.push({ kind: 'required', required: true, message: '' });
            this.$emit('change');
          },
          removeRule: function (i) {
            this.cell.validation.rules.splice(i, 1);
            this.$emit('change');
          },
          onRuleKindChange: function (r) {
            // 用对象替换避免 Vue 2 新字段非响应式问题
            var rules = this.cell.validation.rules;
            var idx = rules.indexOf(r);
            if (idx < 0) return;
            var nr = { kind: r.kind, message: r.message || '', useDepends: false };
            if (r.kind === 'required') nr.required = true;
            else if (r.kind === 'number') { nr.type = 'number'; nr.min = r.min != null ? r.min : null; nr.max = r.max != null ? r.max : null; }
            else if (r.kind === 'string') { nr.type = 'string'; nr.min = r.min != null ? r.min : null; nr.max = r.max != null ? r.max : null; }
            else if (r.kind === 'array') { nr.type = 'array'; nr.min = r.min != null ? r.min : null; nr.max = r.max != null ? r.max : null; }
            else if (r.kind === 'pattern') nr.pattern = r.pattern || '';
            else if (r.kind === 'len') nr.len = r.len != null ? r.len : null;
            else if (r.kind === 'enum') { nr.enum = r.enum || []; nr.enumStr = (r.enum || []).join(','); }
            else if (r.kind === 'custom') { nr.custom = r.custom || ''; nr.depends = ''; }
            else if (r.kind === 'validator') { nr.validator = r.validator || ''; nr.depends = ''; }
            else if (r.kind === 'depends') { nr.required = true; nr.depends = r.depends || ''; }
            this.$set(rules, idx, nr);
            this.$emit('change');
          },
          syncEnum: function (r) {
            var arr = String(r.enumStr == null ? '' : r.enumStr)
              .split(',').map(function (s) { return s.trim(); })
              .filter(Boolean);
            this.$set(r, 'enum', arr);
            this.$emit('change');
          },
          insertFormula: function (tpl) {
            this.$set(this.cell, 'calculationFormula', (this.cell.calculationFormula || '') + tpl);
            this.$emit('change');
          },
          addLinkage: function () {
            if (!this.cell.linkage) this.$set(this.cell, 'linkage', []);
            this.cell.linkage.push({ trigger: '', actions: [] });
            this.$emit('change');
          },
          removeLinkage: function (i) {
            this.cell.linkage.splice(i, 1);
            this.$emit('change');
          },
          addAction: function (lk) {
            lk.actions.push({ kind: 'enable', target: '', type: 'enable' });
            this.$emit('change');
          },
          removeAction: function (li, ai) {
            this.cell.linkage[li].actions.splice(ai, 1);
            this.$emit('change');
          },
          onActionKindChange: function (a) {
            // 用对象替换避免新字段非响应式
            var lk = null, ai = -1;
            for (var i = 0; i < this.cell.linkage.length; i++) {
              var j = this.cell.linkage[i].actions.indexOf(a);
              if (j >= 0) { lk = this.cell.linkage[i]; ai = j; break; }
            }
            if (!lk) return;
            var na = { kind: a.kind, type: a.kind, target: a.target || '' };
            if (a.kind === 'setValue') na.value = a.value != null ? a.value : '';
            if (a.kind && a.kind.indexOf('row') === 0) {
              na.rowTargets = (a.rowTargets || []).map(function (rt) {
                return { row: rt.row || 1, cols: Array.isArray(rt.cols) ? rt.cols : [] };
              });
            }
            this.$set(lk.actions, ai, na);
            this.$emit('change');
          },
          addRowTarget: function (a) {
            if (!a.rowTargets) this.$set(a, 'rowTargets', []);
            a.rowTargets.push({ row: 1, cols: [] });
            this.$emit('change');
          },
          removeRowTarget: function (a, ri) {
            a.rowTargets.splice(ri, 1);
            this.$emit('change');
          },
          toggleFlag: function (key, val) {
            this.$set(this.cell, key, val);
            this.$emit('change');
          },
          setVisibilityState: function (state) {
            this.$set(this.cell, 'disabled', state === 'disabled');
            this.$set(this.cell, 'portalHide', state === 'portalHide');
            this.$set(this.cell, 'platformHide', state === 'platformHide');
            this.$emit('change');
          }
        }
      });

      // 主应用
      new Vue({
        el: '#app',
        template: '#app-tpl',
        data: function () {
          var init = this._loadInit();
          return {
            config: init.config,
            expandedSet: {},
            autoPreview: true,
            showImportModal: false,
            importText: '',
            importError: '',
            showExportModal: false,
            minifyExport: false,
            previewTimer: null,
            previewReady: false,
            pendingPreviewData: null,
            previewError: '',
            editDrawerUid: null,
            listDrawerOpen: false,
            previewMode: 'portal',
            showTemplateModal: false,
            cellTemplates: CELL_TEMPLATES
          };
        },
        computed: {
          maxX: function () {
            var m = 0;
            this.config.cells.forEach(function (c) {
              var parts = String(c.x || '').split(',');
              parts.forEach(function (p) { var n = parseInt(p, 10); if (!isNaN(n) && n > m) m = n; });
            });
            return m;
          },
          maxY: function () {
            var m = 0;
            this.config.cells.forEach(function (c) {
              var parts = String(c.y || '').split(',');
              parts.forEach(function (p) { var n = parseInt(p, 10); if (!isNaN(n) && n > m) m = n; });
            });
            return m;
          },
          duplicateIds: function () {
            var seen = {}, dup = {};
            this.config.cells.forEach(function (c) {
              if (!c.id) return;
              if (seen[c.id]) dup[c.id] = true;
              seen[c.id] = true;
            });
            return Object.keys(dup);
          },
          emptyIdCount: function () {
            return this.config.cells.filter(function (c) { return !c.id; }).length;
          },
          exportText: function () {
            return this.serializeJSON(!this.minifyExport);
          },
          exportSize: function () {
            var bytes = new Blob([this.exportText]).size;
            return bytes < 1024 ? bytes + ' B' : (bytes / 1024).toFixed(1) + ' KB';
          },
          editDrawerCell: function () {
            if (!this.editDrawerUid) return null;
            for (var i = 0; i < this.config.cells.length; i++) {
              if (this.config.cells[i].__uid === this.editDrawerUid) return this.config.cells[i];
            }
            return null;
          },
          editDrawerIndex: function () {
            if (!this.editDrawerUid) return -1;
            for (var i = 0; i < this.config.cells.length; i++) {
              if (this.config.cells[i].__uid === this.editDrawerUid) return i;
            }
            return -1;
          },
          editDrawerOpen: function () {
            return !!this.editDrawerCell;
          },
          editDrawerTitle: function () {
            var c = this.editDrawerCell;
            if (!c) return '编辑单元格';
            return '编辑单元格 · ' + (c.id || '(未命名)') + ' · ' + (TYPE_LABELS[c.type] || c.type);
          }
        },
        mounted: function () {
          this._initPreview();
          this._watchStorage();
        },
        methods: {
          _loadInit: function () {
            // 优先 localStorage
            try {
              var saved = localStorage.getItem(STORAGE_KEY);
              if (saved) {
                var parsed = JSON.parse(saved);
                if (parsed && parsed.cells) {
                  parsed.cells.forEach(function (c) { c.__uid = newUid(); });
                  return { config: parsed };
                }
              }
            } catch (e) {}
            var s = makeSample();
            return { config: s };
          },
          _watchStorage: function () {
            var self = this;
            this.$watch(
              function () { return JSON.stringify(self._stripInternal()); },
              function () {
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(self._stripInternal())); } catch (e) {}
                self.schedulePreview();
              }
            );
          },
          _stripInternal: function () {
            return {
              title: this.config.title,
              cells: this.config.cells.map(function (c) {
                var out = {};
                for (var k in c) {
                  if (k === '__uid') continue;
                  out[k] = c[k];
                }
                if (out.validation && Array.isArray(out.validation.rules)) {
                  out.validation = { rules: out.validation.rules.map(function (r) {
                    var nr = {};
                    for (var k in r) {
                      if (k === 'kind' || k === 'enumStr' || k === 'useDepends') continue;
                      nr[k] = r[k];
                    }
                    return nr;
                  }) };
                }
                return out;
              })
            };
          },
          _initPreview: function () {
            var self = this;
            var iframe = document.getElementById('previewFrame');
            var html = previewEngineHTML();
            // 优先用 srcdoc：origin 继承父页面，file:// 也能正常访问 contentWindow
            var loaded = false;
            function onLoad() {
              if (loaded) return;
              loaded = true;
              console.log('[配置页] preview iframe load 事件触发');
              self._pushPreview(self._stripInternal());
            }
            try {
              if ('srcdoc' in iframe) {
                iframe.setAttribute('srcdoc', html);
              } else {
                // 退化方案：Blob URL（某些场景会被视为跨源）
                var blob = new Blob([html], { type: 'text/html' });
                iframe.src = URL.createObjectURL(blob);
              }
            } catch (e) {
              console.error('[配置页] 注入预览失败:', e);
              self.previewError = '预览引擎注入失败: ' + e.message;
            }
            iframe.addEventListener('load', onLoad);
            // 兜底诊断：6s 后还没就绪，给出提示
            setTimeout(function () {
              if (self.previewError) return;
              try {
                var win = iframe.contentWindow;
                if (!win) {
                  self.previewError = '无法访问预览 iframe（跨源限制）。请用静态服务器（node server.js）打开本页面。';
                } else if (!win.setPreviewData) {
                  self.previewError = '预览引擎 6 秒内未就绪。可能 CDN (Vue/iView) 加载失败，请检查网络后刷新。';
                } else {
                  console.log('[配置页] 预览引擎已就绪');
                }
              } catch (e) {
                self.previewError = '预览跨源访问被浏览器拦截，请用 http 服务器打开本页面（双击打开在 file:// 协议下可能受限）。';
              }
            }, 6000);
            // 监听预览端提交 & 点击 id
            window.addEventListener('message', function (e) {
              if (!e.data) return;
              if (e.data.type === 'preview-submit') {
                self.$Message.success('预览提交成功，数据已输出到 console');
              } else if (e.data.type === 'preview-validate-fail') {
                self.$Message.error('预览校验未通过');
              } else if (e.data.type === 'preview-click-id') {
                self.focusCellById(e.data.id);
              }
            });
          },
          _pushPreview: function (data) {
            var iframe = document.getElementById('previewFrame');
            if (!iframe) return;
            try {
              var win = iframe.contentWindow;
              if (!win) {
                console.warn('[配置页] iframe.contentWindow 不可访问');
                return;
              }
              if (win.setPreviewData) {
                win.setPreviewData(data);
                if (win.setPreviewMode) win.setPreviewMode(this.previewMode);
                this.previewError = '';
                return;
              }
              // 重试等待 setPreviewData 就绪
              var self = this;
              var tries = 0;
              var timer = setInterval(function () {
                tries++;
                try {
                  if (win.setPreviewData) {
                    clearInterval(timer);
                    win.setPreviewData(data);
                    if (win.setPreviewMode) win.setPreviewMode(self.previewMode);
                    self.previewError = '';
                    console.log('[配置页] setPreviewData 重试成功 (tries=' + tries + ')');
                  } else if (tries > 50) {
                    clearInterval(timer);
                    console.warn('[配置页] setPreviewData 5s 内未就绪');
                  }
                } catch (e) {
                  clearInterval(timer);
                  self.previewError = '预览推送异常: ' + e.message + '。建议用 http 服务器打开。';
                }
              }, 100);
            } catch (e) {
              this.previewError = '预览跨源访问被浏览器拦截：' + e.message + '。请用 http 服务器打开本页面。';
              console.warn('[配置页] push preview failed:', e);
            }
          },
          schedulePreview: function () {
            var self = this;
            if (!this.autoPreview) return;
            if (this.previewTimer) clearTimeout(this.previewTimer);
            this.previewTimer = setTimeout(function () {
              self._pushPreview(self._stripInternal());
            }, 400);
          },
          onAutoToggle: function (val) {
            if (val) this.refreshPreview();
          },
          onPreviewModeChange: function () {
            var iframe = document.getElementById('previewFrame');
            if (!iframe) return;
            try {
              var win = iframe.contentWindow;
              if (win && win.setPreviewMode) win.setPreviewMode(this.previewMode);
            } catch (e) {}
          },
          refreshPreview: function () {
            this._pushPreview(this._stripInternal());
          },
          openInNewWindow: function () {
            var data = this._stripInternal();
            var html = previewEngineHTML().replace(
              'window.addEventListener',
              'window.addEventListener'
            );
            // 注入自动初始化：在 setPreviewData 定义后立即调用
            html = html.replace(
              "window.addEventListener('message'",
              "setTimeout(function(){try{window.setPreviewData(" + JSON.stringify(data) + ");window.setPreviewMode(" + JSON.stringify(this.previewMode) + ");}catch(e){console.error(e);}},300); window.addEventListener('message'"
            );
            var blob = new Blob([html], { type: 'text/html' });
            var url = URL.createObjectURL(blob);
            window.open(url, '_blank');
          },
          addCell: function () {
            var c = makeCell({ id: 'cell_' + (this.config.cells.length + 1), x: '1', y: String(this.maxY + 1 || 2), type: 'text', content: '' });
            this.config.cells.push(c);
            this.$set(this.expandedSet, c.__uid, true);
            this.schedulePreview();
          },
          removeCell: function (i) {
            this.config.cells.splice(i, 1);
            this.schedulePreview();
          },
          moveUp: function (i) {
            if (i === 0) return;
            var arr = this.config.cells;
            var tmp = arr[i - 1];
            arr.splice(i - 1, 1, arr[i]);
            arr.splice(i, 1, tmp);
            this.schedulePreview();
          },
          moveDown: function (i) {
            if (i === this.config.cells.length - 1) return;
            var arr = this.config.cells;
            var tmp = arr[i + 1];
            arr.splice(i + 1, 1, arr[i]);
            arr.splice(i, 1, tmp);
            this.schedulePreview();
          },
          duplicateCell: function (i) {
            var src = this.config.cells[i];
            var copy = JSON.parse(JSON.stringify(src));
            copy.__uid = newUid();
            copy.id = (src.id || 'cell') + '_copy';
            this.config.cells.splice(i + 1, 0, copy);
            this.$set(this.expandedSet, copy.__uid, true);
            this.schedulePreview();
          },
          onToggle: function (uid) {
            this.$set(this.expandedSet, uid, !this.expandedSet[uid]);
          },
          focusCellById: function (id) {
            if (!id) return;
            var idx = -1;
            for (var i = 0; i < this.config.cells.length; i++) {
              if (this.config.cells[i].id === id) { idx = i; break; }
            }
            if (idx < 0) {
              this.$Message.info('未找到 id = ' + id + ' 的单元格');
              return;
            }
            this.openEditDrawer(this.config.cells[idx].__uid);
          },
          openEditDrawer: function (uid) {
            this.editDrawerUid = uid;
            this.$set(this.expandedSet, uid, true);
          },
          closeEditDrawer: function () {
            this.editDrawerUid = null;
          },
          addCellAndEdit: function () {
            this.showTemplateModal = true;
          },
          addFromTemplate: function (tpl) {
            var id = tpl.key + '_' + (this.config.cells.length + 1);
            var x = '1';
            var y = String((this.maxY || 1) + 1);
            var partial = tpl.build(id, x, y);
            var c = makeCell(partial);
            this.config.cells.push(c);
            this.showTemplateModal = false;
            this.schedulePreview();
            this.openEditDrawer(c.__uid);
          },
          onEditRemove: function () {
            var i = this.editDrawerIndex;
            if (i < 0) return;
            this.editDrawerUid = null;
            this.config.cells.splice(i, 1);
            this.schedulePreview();
          },
          onEditMove: function (delta) {
            var i = this.editDrawerIndex;
            if (i < 0) return;
            var j = i + delta;
            if (j < 0 || j >= this.config.cells.length) return;
            var arr = this.config.cells;
            var tmp = arr[j];
            arr.splice(j, 1, arr[i]);
            arr.splice(i, 1, tmp);
            this.schedulePreview();
          },
          onEditDuplicate: function () {
            var i = this.editDrawerIndex;
            if (i < 0) return;
            var src = this.config.cells[i];
            var copy = JSON.parse(JSON.stringify(src));
            copy.__uid = newUid();
            copy.id = (src.id || 'cell') + '_copy';
            this.config.cells.splice(i + 1, 0, copy);
            this.openEditDrawer(copy.__uid);
            this.schedulePreview();
          },
          toggleAll: function (expand) {
            var self = this;
            this.config.cells.forEach(function (c) {
              self.$set(self.expandedSet, c.__uid, expand);
            });
          },
          loadSample: function () {
            var s = makeSample();
            this.config = s;
            this.expandedSet = {};
            this.schedulePreview();
            this.$Message.success('已载入示例');
          },
          confirmClear: function () {
            var self = this;
            this.$Modal.confirm({
              title: '确认清空',
              content: '将清空所有单元格配置，确定继续？',
              onOk: function () {
                self.config = { title: self.config.title, cells: [] };
                self.expandedSet = {};
                self.schedulePreview();
              }
            });
          },
          serializeJSON: function (pretty) {
            var data = this._stripInternal();
            // 清理空字段，避免导出垃圾
            var cleaned = {
              title: data.title || '',
              cells: data.cells.map(function (c) {
                var out = { id: c.id, x: String(c.x), y: String(c.y), type: c.type };
                if (c.content) out.content = c.content;
                if (c.value !== undefined && c.value !== '' && c.value !== null) out.value = c.value;
                if (c.placeholder) out.placeholder = c.placeholder;
                if (c.options && c.options.length) out.options = c.options.filter(function (o) { return o.label || o.value; });
                if (c.calculationFormula) out.calculationFormula = c.calculationFormula;
                if (c.accept) out.accept = c.accept;
                if (c.maxSize != null) out.maxSize = c.maxSize;
                if (c.disabled) out.disabled = true;
                if (c._hidden) out._hidden = true;
                if (c.portalHide) out.portalHide = true;
                if (c.platformHide) out.platformHide = true;
                if (c.clampLines != null && c.clampLines > 0) out.clampLines = Number(c.clampLines);
                // validation：把 rule 上的 kind 字段去掉，按 kind 写入正式字段
                if (c.validation && c.validation.rules && c.validation.rules.length) {
                  out.validation = { rules: c.validation.rules.map(serializeRule).filter(function (r) { return Object.keys(r).length > 0; }) };
                }
                if (c.linkage && c.linkage.length) {
                  out.linkage = c.linkage.filter(function (lk) { return lk.trigger && lk.actions && lk.actions.length; }).map(function (lk) {
                    return {
                      trigger: lk.trigger,
                      actions: lk.actions.filter(function (a) { return a.kind; }).map(serializeAction)
                    };
                  });
                }
                return out;
              })
            };
            return JSON.stringify(cleaned, null, pretty ? 2 : 0);
          },
          openExport: function () {
            this.showExportModal = true;
          },
          copyExport: function () {
            var self = this;
            this._copyText(this.exportText).then(function () {
              self.$Message.success('已复制到剪贴板');
            });
          },
          copyJSON: function () {
            var self = this;
            this._copyText(this.serializeJSON(true)).then(function () {
              self.$Message.success('已复制完整 JSON');
            });
          },
          exportFile: function () {
            var text = this.serializeJSON(!this.minifyExport);
            var title = (this.config.title || 'table').replace(/[\\/:*?"<>|]/g, '_');
            var blob = new Blob([text], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = title + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
          },
          doImport: function () {
            this.importError = '';
            var text = this.importText.trim();
            if (!text) {
              this.importError = '请粘贴 JSON 内容';
              return;
            }
            try {
              var data = JSON.parse(text);
              if (!data || typeof data !== 'object' || !Array.isArray(data.cells)) {
                this.importError = 'JSON 必须包含 cells 数组';
                return;
              }
              // 规范化：补 __uid、规范化 validation/linkage 的 kind 字段
              data.cells.forEach(function (c) {
                c.__uid = newUid();
                if (c.validation && c.validation.rules) {
                  c.validation.rules.forEach(inferRuleKind);
                }
                if (c.linkage) {
                  c.linkage.forEach(function (lk) {
                    (lk.actions || []).forEach(inferActionKind);
                  });
                }
              });
              this.config = { title: data.title || '', cells: data.cells };
              this.expandedSet = {};
              this.showImportModal = false;
              this.importText = '';
              this.schedulePreview();
              this.$Message.success('已导入 ' + data.cells.length + ' 个单元格');
            } catch (e) {
              this.importError = 'JSON 解析失败：' + e.message;
            }
          },
          _copyText: function (text) {
            return new Promise(function (resolve, reject) {
              try {
                if (navigator.clipboard) {
                  navigator.clipboard.writeText(text).then(resolve, function () {
                    fallbackCopy(text); resolve();
                  });
                } else {
                  fallbackCopy(text); resolve();
                }
              } catch (e) {
                fallbackCopy(text); resolve();
              }
            });
          }
        }
      });

      // ---------- 序列化辅助 ----------
      function serializeRule(r) {
        var out = {};
        var k = r.kind || 'required';
        if (r.message) out.message = r.message;
        if (k === 'required') {
          out.required = true;
        } else if (k === 'number') {
          out.type = 'number';
          if (r.min != null && r.min !== '') out.min = Number(r.min);
          if (r.max != null && r.max !== '') out.max = Number(r.max);
        } else if (k === 'string') {
          out.type = 'string';
          if (r.min != null && r.min !== '') out.min = Number(r.min);
          if (r.max != null && r.max !== '') out.max = Number(r.max);
        } else if (k === 'array') {
          out.type = 'array';
          if (r.min != null && r.min !== '') out.min = Number(r.min);
          if (r.max != null && r.max !== '') out.max = Number(r.max);
        } else if (k === 'pattern') {
          if (r.pattern) out.pattern = r.pattern;
        } else if (k === 'len') {
          if (r.len != null && r.len !== '') out.len = Number(r.len);
        } else if (k === 'enum') {
          var arr = Array.isArray(r.enum) ? r.enum.slice()
            : String(r.enumStr == null ? '' : r.enumStr).split(',').map(function (s) { return s.trim(); }).filter(Boolean);
          if (arr.length) out.enum = arr;
        } else if (k === 'custom') {
          if (r.custom) out.custom = r.custom;
          if (r.useDepends && r.depends) out.depends = r.depends;
        } else if (k === 'validator') {
          if (r.validator) out.validator = r.validator;
          if (r.useDepends && r.depends) out.depends = r.depends;
        } else if (k === 'depends') {
          out.required = true;
          if (r.depends) out.depends = r.depends;
        }
        return out;
      }

      function serializeAction(a) {
        var out = { type: a.kind };
        if (a.kind === 'setValue') {
          out.target = a.target;
          out.value = a.value != null ? a.value : '';
        } else if (a.kind.indexOf('row') === 0) {
          out.rowTargets = (a.rowTargets || []).filter(function (rt) { return rt.row && rt.cols && rt.cols.length; });
        } else {
          out.target = a.target;
        }
        return out;
      }

      function inferRuleKind(r) {
        if (r.validator) r.kind = 'validator';
        else if (r.custom) r.kind = 'custom';
        else if (r.depends && r.required) r.kind = 'depends';
        else if (r.depends) r.kind = 'custom', r.custom = '';
        else if (r.enum) { r.kind = 'enum'; r.enumStr = (Array.isArray(r.enum) ? r.enum : []).join(','); }
        else if (r.pattern) r.kind = 'pattern';
        else if (r.len != null) r.kind = 'len';
        else if (r.type === 'array') r.kind = 'array';
        else if (r.type === 'string') r.kind = 'string';
        else if (r.type === 'number' && (r.min != null || r.max != null)) r.kind = 'number';
        else r.kind = 'required';
        if (r.depends && (r.kind === 'custom' || r.kind === 'validator')) r.useDepends = true;
      }

      function inferActionKind(a) {
        a.kind = a.type;
        if (a.target) {} // 单目标已存在
        if (a.type && a.type.indexOf('row') === 0) {
          if (!a.rowTargets) a.rowTargets = [];
          a.rowTargets.forEach(function (rt) {
            if (!Array.isArray(rt.cols)) rt.cols = [];
            if (rt.row == null) rt.row = 1;
          });
        }
      }

      function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
      }
    </script>
  </body>
</html>
