<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>动态表格配置器</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/view-design@4.7.0/dist/styles/iview.css"
      onerror="
        this.onerror = null;
        this.href = 'https://unpkg.com/view-design@4.7.0/dist/styles/iview.css';
      "
    />
    <style>
      * {
        box-sizing: border-box;
        font-family: 'Microsoft YaHei', sans-serif;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        background: #f0f2f5;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* ===== 顶部 ===== */
      .app-header {
        background: #fff;
        border-bottom: 1px solid #e8e8e8;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        z-index: 10;
      }
      .app-header .logo {
        font-size: 17px;
        font-weight: bold;
        color: #2a5db0;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .app-header .logo .dot {
        width: 8px;
        height: 8px;
        background: #19be6b;
        border-radius: 50%;
        display: inline-block;
      }
      .app-header .title-input {
        width: 280px;
      }
      .app-header .actions {
        display: flex;
        gap: 6px;
        margin-left: auto;
      }

      /* ===== 主体 ===== */
      .app-main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      /* ===== 预览面板（全宽） ===== */
      .preview-panel--full {
        flex: 1;
        width: 100%;
      }
      .toolbar-divider {
        width: 1px;
        height: 18px;
        background: #e0e0e0;
        margin: 0 6px;
      }
      .state-radio-row {
        padding: 4px 0;
      }
      .state-radio-row .ivu-radio-wrapper {
        margin-right: 16px;
      }
      .template-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .template-card {
        border: 1px solid #e8e8e8;
        border-radius: 6px;
        padding: 14px 10px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        background: #fff;
      }
      .template-card:hover {
        border-color: #2d8cf0;
        background: #f0f7ff;
        transform: translateY(-1px);
        box-shadow: 0 2px 8px rgba(45, 140, 240, 0.15);
      }
      .template-card .template-icon {
        font-size: 28px;
        line-height: 1;
        margin-bottom: 6px;
      }
      .template-card .template-name {
        font-size: 13px;
        font-weight: 600;
        color: #333;
        margin-bottom: 4px;
      }
      .template-card .template-desc {
        font-size: 11px;
        color: #888;
        line-height: 1.4;
      }
      .stat-chip {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        font-size: 12px;
        color: #515a6e;
        background: #f5f7fa;
        border-radius: 10px;
        border: 1px solid #e8eaec;
      }
      .stat-chip.stat-warn {
        color: #ed4014;
        background: #fff1f0;
        border-color: #ffccc7;
      }

      .cell-list {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }
      .cell-list--drawer {
        padding: 4px 0;
      }
      .list-drawer-toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 0 12px;
        border-bottom: 1px solid #e8e8e8;
        margin-bottom: 12px;
      }
      .list-drawer-toolbar .spacer { flex: 1; }
      .empty-state {
        padding: 80px 20px;
        text-align: center;
        color: #999;
      }
      .empty-state .icon {
        font-size: 48px;
        color: #d9d9d9;
        margin-bottom: 12px;
      }

      /* ===== 单元格卡片 ===== */
      .cell-card {
        background: #fff;
        border: 1px solid #e8e8e8;
        border-radius: 6px;
        margin-bottom: 8px;
        transition: box-shadow 0.2s, border-color 0.2s;
      }
      .cell-card:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }
      .cell-card.expanded {
        border-color: #2a5db0;
        box-shadow: 0 2px 10px rgba(42, 93, 176, 0.12);
      }
      .cell-card.has-error {
        border-color: #ffccc7;
      }
      .cell-card.has-error.expanded {
        border-color: #ed4014;
      }
      .cell-card.flash {
        animation: card-flash 1.4s ease-out;
      }
      @keyframes card-flash {
        0%   { box-shadow: 0 0 0 0 rgba(25,190,107,0.0); border-color:#2a5db0; }
        15%  { box-shadow: 0 0 0 6px rgba(25,190,107,0.55); border-color:#19be6b; }
        100% { box-shadow: 0 0 0 0 rgba(25,190,107,0.0); border-color:#2a5db0; }
      }
      /* 抽屉里的卡片：去除折叠头部动画，body 总展开 */
      .edit-drawer .cell-card { margin-bottom: 0; }
      .edit-drawer .cell-card .cell-toggle { display: none; }
      .edit-drawer .cell-card .cell-header { cursor: default; background: #f5f7fa; }
      .edit-drawer .ivu-drawer-body { padding: 12px; background: #fafafa; display: flex; flex-direction: column; }
      .edit-drawer-footer {
        position: sticky; bottom: 0;
        margin: 12px -12px -12px;
        padding: 10px 12px;
        background: #fff;
        border-top: 1px solid #e8eaec;
        display: flex; align-items: center; justify-content: space-between;
        gap: 12px;
      }
      .edit-save-status {
        font-size: 12px; color: #888;
        display: inline-flex; align-items: center; gap: 6px;
      }
      .edit-save-status .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #c5c8ce;
      }
      .edit-save-status.synced { color: #19be6b; }
      .edit-save-status.synced .dot { background: #19be6b; }
      .edit-save-status.dirty:not(.synced) { color: #ff9900; }
      .edit-save-status.dirty:not(.synced) .dot { background: #ff9900; }
      .edit-drawer-actions { display: flex; align-items: center; gap: 12px; }
      .revert-link { font-size: 12px; color: #ed4014; }
      .revert-link.disabled { color: #c5c8ce; cursor: not-allowed; text-decoration: none; }
      .cell-header {
        display: flex;
        align-items: center;
        padding: 8px 12px;
        cursor: pointer;
        gap: 8px;
        user-select: none;
      }
      .cell-toggle {
        color: #999;
        transition: transform 0.2s;
        width: 14px;
        text-align: center;
        font-size: 12px;
      }
      .cell-card.expanded .cell-toggle {
        transform: rotate(90deg);
        color: #2a5db0;
      }
      .cell-id-tag {
        background: #e6f0ff;
        color: #2a5db0;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
        font-family: Consolas, monospace;
        flex-shrink: 0;
      }
      .cell-id-tag.duplicate {
        background: #fff1f0;
        color: #cf1322;
      }
      .cell-id-tag.empty {
        background: #fff7e6;
        color: #d46b08;
      }
      .cell-type-tag {
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        color: #fff;
        flex-shrink: 0;
        line-height: 1.4;
      }
      .cell-type-tag.label {
        background: #888;
      }
      .cell-type-tag.text {
        background: #2db7f5;
      }
      .cell-type-tag.input {
        background: #19be6b;
      }
      .cell-type-tag.number {
        background: #ed4014;
      }
      .cell-type-tag.select {
        background: #ff9900;
      }
      .cell-type-tag.radio {
        background: #5cadff;
      }
      .cell-type-tag.checkbox {
        background: #6c5ce7;
      }
      .cell-type-tag.date {
        background: #00b894;
      }
      .cell-type-tag.upload {
        background: #fd79a8;
      }
      .cell-type-tag.formula {
        background: #e17055;
      }
      .cell-coord {
        color: #888;
        font-size: 12px;
        font-family: Consolas, monospace;
        flex-shrink: 0;
        background: #f5f5f5;
        padding: 2px 6px;
        border-radius: 3px;
      }
      .cell-preview {
        color: #555;
        font-size: 12px;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }
      .cell-actions {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
      }
      .cell-actions .ivu-btn {
        padding: 0 8px;
        height: 24px;
        line-height: 22px;
        font-size: 12px;
      }
      .cell-body {
        padding: 12px 16px 14px;
        border-top: 1px solid #f0f0f0;
        background: #fcfcfd;
      }
      .field-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px 12px;
      }
      .field-grid > div {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
      }
      .field-grid-2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px 12px;
      }
      .field-grid-2 > div {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
      }
      .field-label {
        display: block;
        font-size: 11px;
        color: #888;
        line-height: 1.4;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .field-grid .full {
        grid-column: 1 / -1;
      }
      .field-grid .span2 {
        grid-column: span 2;
      }
      .field-group {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px dashed #e8e8e8;
      }
      .field-group-title {
        font-size: 13px;
        font-weight: bold;
        color: #2a5db0;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .field-group-title .badge-count {
        background: #e6f0ff;
        color: #2a5db0;
        padding: 0 6px;
        border-radius: 8px;
        font-size: 11px;
        line-height: 16px;
      }
      .field-group-title .add-btn {
        margin-left: auto;
      }

      /* ===== 预览面板 ===== */
      .preview-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #f5f7fa;
        overflow: hidden;
        min-width: 0;
      }
      .preview-toolbar {
        padding: 8px 16px;
        background: #fff;
        border-bottom: 1px solid #e8e8e8;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .preview-toolbar .spacer {
        flex: 1;
      }
      .preview-toolbar .auto-tip {
        font-size: 12px;
        color: #888;
      }
      .preview-frame-wrap {
        flex: 1;
        overflow: hidden;
        padding: 12px;
        position: relative;
      }
      /* ===== 子列表编辑器（options/rules/actions） ===== */
      .sub-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .sub-item {
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 6px;
        background: #fff;
        border: 1px solid #f0f0f0;
        border-radius: 4px;
      }
      .sub-item .row-grow {
        flex: 1;
        display: flex;
        gap: 4px;
        align-items: center;
        min-width: 0;
      }
      .sub-item .row-grow .ivu-input-wrapper,
      .sub-item .row-grow .ivu-select,
      .sub-item .row-grow .ivu-input-number,
      .sub-item .row-grow .ivu-date-picker {
        flex: 1;
        min-width: 0;
      }
      .sub-item .sub-remove {
        flex-shrink: 0;
      }
      .sub-item-vertical {
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
      }
      .sub-item-vertical .row-grow {
        width: 100%;
      }
      .rule-help {
        background: #f0f5ff;
        border-left: 3px solid #2d8cf0;
        padding: 5px 8px;
        font-size: 11px;
        line-height: 1.6;
        color: #515a6e;
        border-radius: 0 3px 3px 0;
      }
      .rule-help code {
        background: #e8edf5;
        padding: 0 4px;
        border-radius: 2px;
        font-family: 'Consolas', monospace;
        font-size: 11px;
        color: #2a5db0;
      }
      .rule-help b {
        color: #2d8cf0;
      }
      .event-params-doc {
        background: #fafbfc;
        border: 1px solid #e8eaec;
        border-radius: 3px;
        padding: 6px 8px;
        margin-bottom: 6px;
      }
      .event-param-row {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        font-size: 11px;
        line-height: 1.6;
        padding: 2px 0;
        color: #515a6e;
      }
      .event-param-row .param-name {
        background: #e8edf5;
        color: #2a5db0;
        padding: 0 6px;
        border-radius: 2px;
        font-family: 'Consolas', monospace;
        flex-shrink: 0;
        min-width: 70px;
        text-align: center;
      }
      .event-param-row .param-type {
        color: #888;
        flex-shrink: 0;
        min-width: 75px;
        font-style: italic;
      }
      .event-param-row .param-desc {
        flex: 1;
      }
      .event-param-row .param-desc code {
        background: #e8edf5;
        padding: 0 3px;
        border-radius: 2px;
        font-family: 'Consolas', monospace;
        color: #2a5db0;
      }
      .event-param-row .raw-event-list {
        display: flex;
        flex-direction: column;
        gap: 1px;
        margin-top: 2px;
        padding-left: 4px;
        border-left: 2px solid #e8eaec;
      }
      .target-picker {
        display: flex;
        gap: 4px;
        align-items: center;
        flex-wrap: wrap;
      }
      .target-picker .target-id {
        flex: 1;
        min-width: 120px;
      }
      .target-picker .target-act {
        width: 100px;
      }
      .target-picker .target-val {
        flex: 1;
        min-width: 80px;
      }

      .row-target-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-top: 4px;
      }
      .row-target-item {
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 4px 6px;
        background: #f9f9f9;
        border-radius: 3px;
        font-size: 12px;
      }
      .row-target-item .row-num {
        width: 80px;
        flex-shrink: 0;
      }
      .row-target-item .cols-input {
        flex: 1;
      }
      .row-target-item .sub-remove {
        flex-shrink: 0;
      }

      /* ===== 表达式辅助 ===== */
      .expr-hint {
        margin-top: 4px;
        font-size: 11px;
        color: #999;
      }
      .expr-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 4px;
      }
      .expr-chip {
        background: #f0f5ff;
        color: #2a5db0;
        padding: 1px 6px;
        border-radius: 10px;
        font-size: 11px;
        cursor: pointer;
        font-family: Consolas, monospace;
        border: 1px solid #d6e4ff;
        transition: background 0.15s;
      }
      .expr-chip:hover {
        background: #d6e4ff;
      }
      .expr-chip.tpl {
        background: #f6ffed;
        color: #389e0d;
        border-color: #b7eb8f;
      }
      .expr-chip.tpl:hover {
        background: #b7eb8f;
      }

      /* ===== JSON 弹窗 ===== */
      .json-modal-textarea .ivu-input {
        font-family: Consolas, monospace;
        font-size: 12px;
      }

      /* ===== 使用说明弹窗 ===== */
      .help-content { font-size: 13px; line-height: 1.7; color: #333; max-height: 70vh; overflow-y: auto; padding-right: 8px; }
      .help-content h3 { margin: 18px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #e8eaec; color: #19be6b; font-size: 14px; }
      .help-content h3:first-child { margin-top: 0; }
      .help-content p { margin: 4px 0; }
      .help-content ul, .help-content ol { margin: 4px 0 4px 20px; padding: 0; }
      .help-content li { margin: 2px 0; }
      .help-content code { background: #f5f7fa; padding: 1px 5px; border-radius: 3px; font-family: Consolas, monospace; font-size: 12px; color: #c5302b; }
      .help-content b { color: #2a5db0; }

      .size-mini .ivu-btn {
        padding: 0 8px;
        height: 22px;
        line-height: 20px;
        font-size: 11px;
      }

      /* 滚动条美化 */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.15);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.3);
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }

      /* ==================== 预览渲染子组件（替代 iframe）样式 ==================== */
      .preview-renderer {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
      }
      .preview-renderer .table-wrapper {
        overflow: auto;
        flex: 1;
        min-height: 0;
        background: #fff;
        padding: 8px;
      }
      .preview-renderer .axis-row-top {
        position: sticky;
        top: 0;
        z-index: 2;
      }
      .preview-renderer .axis-row-head {
        position: sticky;
        left: 0;
        z-index: 2;
      }
      .preview-renderer .axis-corner {
        position: sticky;
        top: 0;
        left: 0;
        z-index: 3;
      }
      .preview-renderer .axis-col-width {
        width: 34px;
      }
      .preview-renderer .axis-corner,
      .preview-renderer .axis-col-head,
      .preview-renderer .axis-row-head {
        background: #f5f7fa !important;
        color: #909399 !important;
        font-size: 11px !important;
        font-weight: normal !important;
        padding: 2px 4px !important;
        text-align: center !important;
        border-color: #d0d7de !important;
        user-select: none;
      }
      .preview-renderer .axis-corner {
        background: #ebeef5 !important;
      }
      .preview-renderer table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        word-break: break-word;
      }
      .preview-renderer th,
      .preview-renderer td {
        border: 1px solid #999;
        padding: 6px 8px;
        text-align: center;
        vertical-align: middle;
        font-size: 13px;
        line-height: 1.5;
        position: relative;
      }
      .preview-renderer th {
        background: #d0d8e8;
        font-weight: bold;
      }
      .preview-renderer td {
        background: #fff;
      }
      .preview-renderer tr:hover td {
        background: #f0f5ff;
      }
      .preview-renderer .cell-group {
        background: #e8edf5;
        font-weight: bold;
      }
      .preview-renderer .cell-clamp {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
        word-break: break-word;
        line-height: 1.5;
      }
      .preview-renderer .alt-item {
        width: 100%;
      }
      .preview-renderer .formula-val {
        font-weight: bold;
        color: #2a5db0;
        font-size: 15px;
      }
      .preview-renderer td .ivu-form-item {
        margin-bottom: 0;
      }
      .preview-renderer td .ivu-form-item-error-tip {
        position: relative;
        padding-top: 2px;
        font-size: 11px;
      }
      .preview-renderer td .ivu-input-number,
      .preview-renderer td .ivu-select {
        width: 100%;
      }
      .preview-renderer .radio-in-cell {
        text-align: left;
        padding: 2px 0;
      }
      .preview-renderer .radio-in-cell .ivu-radio-group {
        display: flex !important;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      .preview-renderer .radio-in-cell .ivu-radio-wrapper {
        white-space: normal !important;
        height: auto !important;
        line-height: 1.5 !important;
        display: block !important;
        margin-right: 0;
      }
      .preview-renderer .radio-in-cell .ivu-radio-wrapper > .ivu-radio {
        vertical-align: top;
        margin-top: 2px;
      }
      .preview-renderer .cell-id-badge {
        position: absolute;
        top: 0;
        left: 0;
        font-size: 9px;
        line-height: 1;
        color: #fff;
        background: rgba(45, 140, 240, 0.7);
        padding: 1px 3px;
        border-radius: 0 0 3px 0;
        z-index: 1;
        cursor: pointer;
        white-space: nowrap;
        max-width: 80px;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: background 0.15s;
      }
      .preview-renderer .cell-id-badge:hover {
        background: rgba(45, 140, 240, 1);
      }
      .preview-renderer .cell-id-badge.label-badge {
        background: rgba(140, 140, 140, 0.65);
      }
      .preview-renderer .cell-id-badge.label-badge:hover {
        background: rgba(100, 100, 100, 0.9);
      }
      .preview-renderer .upload-in-cell {
        text-align: left;
        padding: 2px 0;
      }
      .preview-renderer .upload-link {
        text-decoration: underline;
        color: #2a5db0;
        cursor: pointer;
      }
      .preview-renderer .uploaded-file {
        display: flex;
        align-items: center;
        margin-top: 4px;
        gap: 4px;
      }
      .preview-renderer .remove-file-icon {
        cursor: pointer;
        color: #999;
        font-size: 16px;
      }
      .preview-renderer .remove-file-icon:hover {
        color: #ed4014;
      }
      .preview-renderer .preview-empty {
        padding: 60px 20px;
        text-align: center;
        color: #999;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!-- ==================== 主应用模板 ==================== -->
    <script type="text/x-template" id="app-tpl">
      <div class="app-root" style="display:flex;flex-direction:column;height:100vh;">
        <!-- 顶部 -->
        <header class="app-header">
          <div class="logo"><span class="dot"></span>动态表格配置器</div>
          <i-input
            v-model="config.title"
            placeholder="表格标题（对应 title 字段）"
            class="title-input"
            @on-change="schedulePreview"
          />
          <div class="actions">
            <i-button type="primary" @click="showTemplateModal = true">+ 添加单元格</i-button>
            <i-button @click="listDrawerOpen = true">📋 单元格列表</i-button>
            <i-button @click="showHelpModal = true">📖 使用说明</i-button>
            <i-button @click="showImportModal = true">导入 JSON</i-button>
            <i-button type="primary" @click="openExport">导出 JSON</i-button>
            <i-button @click="copyJSON">复制 JSON</i-button>
            <i-button @click="confirmClear">清空</i-button>
          </div>
        </header>

        <!-- 主体：预览占满全宽 -->
        <main class="app-main">
          <section class="preview-panel preview-panel--full">
            <div class="preview-toolbar">
              <span class="auto-tip">自动预览</span>
              <i-switch v-model="autoPreview" size="small" @on-change="onAutoToggle" />
              <span class="toolbar-divider"></span>
              <span class="auto-tip">视角</span>
              <radio-group v-model="previewMode" size="small" type="button">
                <radio label="portal"><span>门户端</span></radio>
                <radio label="platform"><span>管理端</span></radio>
              </radio-group>
              <span class="spacer"></span>
              <span class="stat-chip">单元格 {{config.cells.length}}</span>
              <span class="stat-chip">X {{maxX || '-'}}</span>
              <span class="stat-chip">Y {{maxY || '-'}}</span>
              <tooltip placement="bottom" transfer v-if="duplicateIds.length">
                <span class="stat-chip stat-warn">重复 {{duplicateIds.length}}</span>
                <div slot="content" style="white-space:normal;max-width:260px;">
                  <div style="font-weight:600;margin-bottom:4px;">重复的 ID:</div>
                  <div v-for="id in duplicateIds" :key="id" style="line-height:1.6;">• {{ id }}</div>
                </div>
              </tooltip>
              <span class="stat-chip stat-warn" v-if="emptyIdCount">缺ID {{emptyIdCount}}</span>
              <i-button size="small" @click="refreshPreview">刷新预览</i-button>
              <i-button size="small" @click="openInNewWindow">新窗口</i-button>
              <i-button size="small" @click="exportFile">下载 JSON</i-button>
            </div>
            <div class="preview-frame-wrap">
              <preview-renderer
                v-if="previewConfig && previewConfig.cells && previewConfig.cells.length"
                :config="previewConfig"
                :mode="previewMode"
                @click-id="focusCellById"
                @submit="onPreviewSubmit"
                @validate-fail="onPreviewValidateFail">
              </preview-renderer>
              <div v-else class="preview-empty">
                <div class="icon">▣</div>
                <div>暂无数据，导入 JSON 或添加单元格开始预览</div>
              </div>
            </div>
          </section>
        </main>

        <!-- 编辑抽屉：点击徽章打开 -->
        <drawer
          :value="editDrawerOpen"
          @on-close="closeEditDrawer"
          :width="520"
          :title="editDrawerTitle"
          :mask="true"
          :transfer="true"
          class-name="edit-drawer"
        >
          <div v-if="!editDrawerCell" style="padding:24px;color:#999;text-align:center;">
            单元格已删除
          </div>
          <template v-else>
            <cell-card
              :cell="editDrawerCell"
              :index="editDrawerIndex"
              :total="config.cells.length"
              :all-cells="config.cells"
              :is-duplicate="duplicateIds.indexOf(editDrawerCell.id) >= 0"
              :expanded-set="expandedSet"
              @toggle="onToggle"
              @remove="onEditRemove"
              @move-up="onEditMove(-1)"
              @move-down="onEditMove(1)"
              @duplicate="onEditDuplicate"
              @change="schedulePreview"
            ></cell-card>
            <div class="edit-drawer-footer">
              <div class="edit-save-status" :class="{ dirty: editDrawerDirty }">
                <template v-if="!editDrawerDirty">
                  <span class="dot"></span> 未修改
                </template>
                <template v-else>
                  <span class="dot"></span> 已修改，点"确定"写入表格
                </template>
              </div>
              <div class="edit-drawer-actions">
                <a
                  href="javascript:void(0)"
                  class="revert-link"
                  :class="{ disabled: !editDrawerDirty }"
                  @click="editDrawerDirty && revertEditDrawer()"
                >放弃修改</a>
                <i-button type="primary" size="small" @click="commitEditDrawer">确定</i-button>
              </div>
            </div>
          </template>
        </drawer>

        <!-- 列表抽屉：管理所有单元格（关闭时不渲染，避免大量 cell-card 常驻） -->
        <drawer
          v-model="listDrawerOpen"
          :width="560"
          title="单元格列表"
          :transfer="true"
          class-name="list-drawer"
        >
          <template v-if="listDrawerOpen">
            <div class="list-drawer-toolbar">
              <i-button size="small" type="primary" @click="addCell">+ 添加</i-button>
              <i-button size="small" @click="toggleAll(true)">全展开</i-button>
              <i-button size="small" @click="toggleAll(false)">全折叠</i-button>
              <span class="spacer"></span>
              <span style="font-size:12px;color:#888;">点击卡片标题展开/收起；点徽章上的 ⚙ 直接编辑</span>
            </div>
            <div class="cell-list cell-list--drawer">
              <div v-if="!config.cells.length" class="empty-state">
                <div class="icon">▣</div>
                <div>暂无单元格，点击"+ 添加"或顶部"载入示例"开始</div>
              </div>
              <cell-card
                v-for="(cell, i) in config.cells"
                :key="cell.__uid"
                :cell="cell"
                :index="i"
                :total="config.cells.length"
                :all-cells="config.cells"
                :is-duplicate="duplicateIds.indexOf(cell.id) >= 0"
                :expanded-set="expandedSet"
                @toggle="onToggle"
                @remove="removeCell"
                @move-up="moveUp"
                @move-down="moveDown"
                @duplicate="duplicateCell"
                @change="schedulePreview"
              ></cell-card>
            </div>
          </template>
        </drawer>

        <!-- 导入弹窗 -->
        <modal
          v-model="showImportModal"
          title="导入 JSON"
          width="700"
          :mask-closable="false"
          ok-text="导入"
          cancel-text="取消"
          @on-ok="doImport"
        >
          <i-input
            v-model="importText"
            type="textarea"
            :rows="18"
            placeholder='粘贴 JSON，格式：{"title":"...","cells":[...]}'
            class="json-modal-textarea"
          />
          <div v-if="importError" style="color:#ed4014;margin-top:8px;font-size:12px;">{{importError}}</div>
        </modal>

        <!-- 使用说明弹窗 -->
        <modal v-model="showHelpModal" title="使用说明" width="720" footer-hide class="help-modal">
          <div class="help-content">
            <h3>① 坐标系统</h3>
            <p>每个单元格用 <code>x</code>（列）和 <code>y</code>（行）定位，从 1 开始。</p>
            <ul>
              <li>单个位置：<code>x: "1"</code>、<code>y: "3"</code></li>
              <li>合并多列：<code>x: "1,3"</code> 表示列 1-3 合并</li>
              <li>合并多行：<code>y: "3,5"</code> 表示行 3-5 合并</li>
              <li>跨行跨列：<code>x: "1,3" y: "3,5"</code> = 9 格合并</li>
            </ul>

            <h3>② 单元格类型（9 种）</h3>
            <ul>
              <li><b>label</b>：表头/标题（粗体背景）</li>
              <li><b>text</b>：静态文字（可含 <code>&lt;b&gt;</code> 加粗）</li>
              <li><b>input / number</b>：单行文本 / 数字输入</li>
              <li><b>select / radio / checkbox</b>：下拉 / 单选 / 多选（需配 <code>options</code>）</li>
              <li><b>date / upload</b>：日期 / 附件上传</li>
              <li><b>formula</b>：公式计算（只读展示）</li>
            </ul>

            <h3>③ 校验规则（validation.rules）</h3>
            <p>每条规则独立，可叠加。常用字段：</p>
            <ul>
              <li><code>required: true</code> + <code>message</code>：必填</li>
              <li><code>type: "number"</code> + <code>min</code>/<code>max</code>：数值范围</li>
              <li><code>type: "array"</code> + <code>min</code>：checkbox/upload 至少 N 项</li>
              <li><code>pattern: "^\d+$"</code>：正则匹配</li>
              <li><code>enumStr: "A,B,C"</code>：枚举值（逗号分隔，自动转 enum）</li>
              <li><code>custom: "value >= bm && value <= bl"</code>：表达式校验</li>
              <li><code>depends: "bm_r42 != null"</code>：依赖条件（条件不满足跳过校验）</li>
              <li><code>validator: "return value !== ''"</code>：函数体（参数 value/fm/extra）</li>
            </ul>

            <h3>④ 联动（linkage）</h3>
            <p>当某个 cell 的值变化时触发动作。结构：<code>trigger</code>（触发值）→ <code>actions</code>（动作列表）</p>
            <ul>
              <li>单格动作：<code>show/hide/enable/disable/clear/setValue</code> + <code>target</code></li>
              <li>行级动作：<code>rowEnable/rowDisable/rowClear</code> + <code>rowTargets</code>（一次操作多列）</li>
            </ul>

            <h3>⑤ 事件（events）<span style="font-size:11px;color:#2d8cf0;font-weight:normal;"> 新</span></h3>
            <p>每个控件 cell 可配 <code>events</code> 字段，在值变化/失焦/输入时执行任意 JS 函数体。比 linkage 更灵活，能写跨字段重算、格式化、条件赋值等。</p>
            <ul>
              <li><code>onChange</code>：值变化后触发（所有控件通用）</li>
              <li><code>onBlur</code>：失焦时触发（仅 input）</li>
              <li><code>onInput</code>：输入中触发（仅 input，高频慎用）</li>
            </ul>
            <p>函数体签名 <code>(value, fm, extra, rawEvent)</code>：</p>
            <ul>
              <li><code>value</code>：当前字段的新值（已存入 fm[id]）</li>
              <li><code>fm.字段ID</code>：读写整个表单 model（如 <code>fm.total = Number(fm.a) + Number(fm.b)</code>）</li>
              <li><code>extra</code>：<code>{ cell, cellMap }</code>（cell 配置对象 + 所有 cell 字典）</li>
              <li><code>rawEvent</code>：iView 组件原生事件参数 ——<br>
                <span style="font-size:11px;color:#888;padding-left:14px;">
                  input-number/select/radio/checkbox：<code>选中值</code>；<br>
                  date：<code>{ date: Date对象, label: 'date' }</code>；<br>
                  input on-blur：原生 <code>FocusEvent</code>；<br>
                  input onInput：<code>输入字符串</code>
                </span>
              </li>
            </ul>
            <pre style="background:#f6f8fa;padding:8px;border-radius:3px;font-size:11px;overflow-x:auto;"><code>// 跨字段重算
events: {
  onChange: "fm.total = (Number(fm.a) || 0) + (Number(fm.b) || 0)",
  onBlur: "fm.indval_r3 = (fm.indval_r3 || '').trim()"
}

// 拿原生参数：date-picker 选日期
events: {
  onChange: "fm.date_str = rawEvent.date ? rawEvent.date.toISOString() : ''"
}</code></pre>

            <h3>⑥ 公式（formula.calculationFormula）</h3>
            <ul>
              <li><code>SUM(c6, e5, f5)</code>：求和（text 类型取 content 数字）</li>
              <li><code>AVG(c6, e5)</code>：平均（保留 2 位小数）</li>
              <li><code>MIN(c6, e5)</code>：最小值</li>
              <li><code>CALC_SCORE</code>：所有 number cell 求和</li>
              <li><code>CALC(Math.max(0, bm - bl))</code>：表达式（cell id 直接引用）</li>
            </ul>

            <h3>⑦ 隐藏 / 禁用</h3>
            <ul>
              <li><code>portalHide: true</code>：企业端隐藏</li>
              <li><code>platformHide: true</code>：管理端隐藏</li>
              <li><code>_hidden: true</code>：双端都隐藏（调试用）</li>
              <li><code>disabled: true</code>：只读（控件禁用）</li>
              <li>整列无可见 cell 时自动 collapse；整行无可见 cell 时整行不渲染</li>
            </ul>

            <h3>⑧ 推荐工作流</h3>
            <ol>
              <li>载入示例或从模板添加几个 cell</li>
              <li>右侧预览表格，点徽章可快速定位编辑</li>
              <li>切换企业端/管理端预览，验证隐藏效果</li>
              <li>填值 → 提交，控制台查看输出 JSON</li>
              <li>导出 JSON 给后端</li>
            </ol>
          </div>
        </modal>

        <!-- 导出弹窗 -->
        <modal v-model="showExportModal" title="导出 JSON" width="700" footer-hide>
          <div style="margin-bottom:8px;display:flex;gap:8px;align-items:center;">
            <i-button size="small" @click="copyExport">复制</i-button>
            <i-button size="small" @click="exportFile">下载</i-button>
            <i-switch v-model="minifyExport" size="small" />
            <span style="font-size:12px;color:#888;">压缩为一行</span>
            <span style="flex:1"></span>
            <span style="font-size:12px;color:#888;">{{exportSize}}</span>
          </div>
          <i-input
            :value="exportText"
            type="textarea"
            :rows="22"
            readonly
            class="json-modal-textarea"
          />
        </modal>

        <!-- 模板选择弹窗 -->
        <modal
          v-model="showTemplateModal"
          title="选择单元格模板"
          width="640"
          :mask-closable="true"
          footer-hide
        >
          <div class="template-grid">
            <div
              v-for="t in cellTemplates"
              :key="t.key"
              class="template-card"
              @click="addFromTemplate(t)"
            >
              <div class="template-icon">{{t.icon}}</div>
              <div class="template-name">{{t.name}}</div>
              <div class="template-desc">{{t.desc}}</div>
            </div>
          </div>
          <div style="margin-top:12px;font-size:12px;color:#888;text-align:center;">
            创建后会自动定位到下一个空位（x:1, y:{{maxY + 1}}），可在抽屉里改坐标
          </div>
        </modal>
      </div>
    </script>

    <!-- ==================== 单元格卡片模板 ==================== -->
    <script type="text/x-template" id="cell-card-tpl">
      <div class="cell-card" :class="{ expanded: isExpanded, 'has-error': isDuplicate || !cell.id }"
           :data-cell-id="cell.id">
        <div class="cell-header" @click="$emit('toggle', cell.__uid)">
          <span class="cell-toggle">▶</span>
          <span class="cell-id-tag" :class="{ duplicate: isDuplicate, empty: !cell.id }">
            {{cell.id || '(未命名)'}}
          </span>
          <span class="cell-type-tag" :class="cell.type">{{typeLabel}}</span>
          <span class="cell-coord">x:{{cell.x}} y:{{cell.y}}</span>
          <span class="cell-preview" v-html="previewText"></span>
          <span class="cell-actions" @click.stop>
            <i-button size="small" @click="$emit('move-up', index)" :disabled="index === 0">↑</i-button>
            <i-button size="small" @click="$emit('move-down', index)" :disabled="index === total - 1">↓</i-button>
            <i-button size="small" @click="$emit('duplicate', index)">复制</i-button>
            <i-button size="small" type="error" ghost @click="$emit('remove', index)">删</i-button>
          </span>
        </div>

        <div class="cell-body" v-show="isExpanded" @change="$emit('change')" @input="$emit('change')">
          <!-- 基础字段 -->
          <div class="field-grid">
            <div>
              <label class="field-label">ID</label>
              <i-input v-model="cell.id" size="small" placeholder="唯一标识，如 h1 / c8_benchmark" />
            </div>
            <div>
              <label class="field-label">类型 type</label>
              <i-select v-model="cell.type" size="small" @on-change="onTypeChange">
                <i-option v-for="t in types" :value="t.v" :key="t.v">{{t.l}}</i-option>
              </i-select>
            </div>
            <div>
              <label class="field-label">&nbsp;</label>
              <div style="font-size:11px;color:#888;padding-top:6px;">{{typeHint}}</div>
            </div>
            <div>
              <label class="field-label">列坐标 x</label>
              <i-input v-model="cell.x" size="small" placeholder="如 1 或 3,5（合并多列）" />
            </div>
            <div>
              <label class="field-label">行坐标 y</label>
              <i-input v-model="cell.y" size="small" placeholder="如 1 或 1,2（合并多行）" />
            </div>
            <div>
              <label class="field-label">初始值 value</label>
              <i-input v-model="cell.value" size="small" placeholder="可选" />
            </div>
            <div class="full">
              <label class="field-label">显示内容 content（支持 HTML）</label>
              <i-input v-model="cell.content" type="textarea" :rows="2" size="small" placeholder="label/text 显示的文本；select/radio 的提示文字" />
            </div>
            <div class="full" v-if="hasPlaceholder">
              <label class="field-label">占位提示 placeholder</label>
              <i-input v-model="cell.placeholder" size="small" placeholder="输入框/数字框的占位提示" />
            </div>
            <div v-if="cell.type === 'label' || cell.type === 'text'">
              <label class="field-label">溢出隐藏 clampLines</label>
              <input-number v-model="cell.clampLines" size="small" :min="0" :step="1" placeholder="0" style="width:100%" />
              <div style="font-size:11px;color:#888;padding-top:2px;">0 或空 = 全部显示；N = 截断到 N 行（鼠标悬停看完整）</div>
            </div>
          </div>

          <!-- 类型相关 -->
          <!-- options -->
          <div class="field-group" v-if="hasOptions">
            <div class="field-group-title">
              选项 options
              <span class="badge-count">{{(cell.options || []).length}}</span>
              <i-button class="add-btn" size="small" type="primary" ghost @click="addOption">+ 添加选项</i-button>
            </div>
            <div class="sub-list">
              <div class="sub-item" v-for="(opt, i) in (cell.options || [])" :key="i">
                <div class="row-grow">
                  <i-input v-model="opt.label" size="small" placeholder="显示文字" />
                  <i-input v-model="opt.value" size="small" placeholder="值 value" style="max-width:140px;" />
                </div>
                <i-button class="sub-remove" size="small" type="error" ghost @click="removeOption(i)">×</i-button>
              </div>
              <div v-if="!(cell.options && cell.options.length)" style="color:#999;font-size:12px;">尚未配置选项</div>
            </div>
          </div>

          <!-- formula -->
          <div class="field-group" v-if="cell.type === 'formula'">
            <div class="field-group-title">公式 calculationFormula</div>
            <i-input v-model="cell.calculationFormula" type="textarea" :rows="2" size="small" placeholder="如 SUM(c6,e5,f5) 或 CALC(Math.max(0, bm-bl))" />
            <div class="expr-chips">
              <span class="expr-chip tpl" @click="insertFormula('SUM()')">SUM()</span>
              <span class="expr-chip tpl" @click="insertFormula('AVG()')">AVG()</span>
              <span class="expr-chip tpl" @click="insertFormula('MIN()')">MIN()</span>
              <span class="expr-chip tpl" @click="insertFormula('CALC_SCORE')">CALC_SCORE</span>
              <span class="expr-chip tpl" @click="insertFormula('CALC()')">CALC()</span>
            </div>
            <div class="expr-hint">单元格 id 可在预览徽章或列表抽屉里查看。CALC 内可用 Math.max/Math.round/三元表达式。</div>
          </div>

          <!-- upload -->
          <div class="field-group" v-if="cell.type === 'upload'">
            <div class="field-group-title">上传配置</div>
            <div class="field-grid-2">
              <div>
                <label class="field-label">允许格式 accept</label>
                <i-input v-model="cell.accept" size="small" placeholder=".pdf,.jpg,.png" />
              </div>
              <div>
                <label class="field-label">最大体积 maxSize (MB)</label>
                <input-number v-model="cell.maxSize" size="small" :min="0" :step="1" style="width:100%" />
              </div>
              <div class="full" style="grid-column: 1 / -1;">
                <div class="rule-help" style="margin-top:2px;">
                  <b>accept</b>=允许的文件后缀（逗号分隔）；<b>maxSize</b>=单文件大小上限（MB），超出会拒绝上传。校验"至少上传 N 个"在校验规则里配 array + min。
                </div>
              </div>
            </div>
          </div>

          <!-- 校验 validation -->
          <div class="field-group" v-if="hasValidation">
            <div class="field-group-title">
              校验规则 validation.rules
              <span class="badge-count">{{(cell.validation && cell.validation.rules || []).length}}</span>
              <i-button class="add-btn" size="small" type="primary" ghost @click="addRule">+ 添加规则</i-button>
              <i-checkbox v-model="advancedRules" style="margin-left:8px;">
                <span style="font-size:11px;color:#888;">高级（string/pattern/enum/custom…）</span>
              </i-checkbox>
            </div>
            <div class="sub-list">
              <div class="sub-item sub-item-vertical" v-for="(r, i) in validationRules" :key="i">
                <div class="row-grow">
                  <i-select v-model="r.kind" size="small" style="width:140px;flex:0 0 140px;" @on-change="onRuleKindChange(r)">
                    <i-option value="required">必填 required</i-option>
                    <i-option value="number">数值范围 min/max</i-option>
                    <i-option value="array">数组长度 array</i-option>
                    <template v-if="advancedRules">
                      <i-option value="string">长度 min/max</i-option>
                      <i-option value="pattern">正则 pattern</i-option>
                      <i-option value="len">定长 len</i-option>
                      <i-option value="enum">枚举 enum</i-option>
                      <i-option value="custom">自定义 custom 表达式</i-option>
                      <i-option value="validator">validator 函数体</i-option>
                      <i-option value="depends">条件必填 depends</i-option>
                    </template>
                  </i-select>
                  <i-input v-model="r.message" size="small" placeholder="错误提示文字" style="flex:1;" />
                  <i-button class="sub-remove" size="small" type="error" ghost @click="removeRule(i)">×</i-button>
                </div>
                <!-- 说明：根据 kind 显示对应解释 -->
                <div class="rule-help" v-if="r.kind === 'required'">
                  必填校验。<b>普通必填</b>=勾选后该字段始终必填；<b>动态条件必填</b>=填写表达式（可访问 <code>fm.字段ID</code> 引用其他字段值），表达式为真时才校验。
                </div>
                <div class="rule-help" v-if="r.kind === 'number'">
                  数值范围。仅对 <code>number</code> 类型字段生效。min/max 限定数字大小，任一可留空（如只填 min 则只校验下限）。
                </div>
                <div class="rule-help" v-if="r.kind === 'array'">
                  数组长度校验。对 <code>checkbox</code> 多选 / <code>upload</code> 上传生效。<b>min</b>=至少选 N 个/上传 N 个，<b>max</b>=最多 N 个。
                </div>
                <div class="rule-help" v-if="r.kind === 'string'">
                  字符串长度校验。对 <code>input</code> 生效。min/max 限定字符数（min=最短，max=最长），任一可留空。
                </div>
                <div class="rule-help" v-if="r.kind === 'pattern'">
                  正则校验。填写 JS 正则字符串（不带斜杠），值必须匹配整个正则。
                </div>
                <div class="rule-help" v-if="r.kind === 'len'">
                  定长校验。值的长度必须精确等于 len（如身份证 18 位、手机号 11 位）。
                </div>
                <div class="rule-help" v-if="r.kind === 'enum'">
                  枚举校验。值必须在下列出的枚举值之内，逗号分隔（如 <code>A,B,C</code>）。多用于 select/radio。
                </div>
                <div class="rule-help" v-if="r.kind === 'custom'">
                  自定义表达式校验。可访问 <code>value</code>（当前字段值）和 <code>fm.字段ID</code>（其他字段值），表达式为真=校验通过。常用于跨字段联动校验。
                </div>
                <div class="rule-help" v-if="r.kind === 'validator'">
                  自定义函数体。填写 JS 函数体，参数 <code>(value, fm, extra)</code>，<code>return true</code>=校验通过，<code>return false</code> 或抛错=失败。最灵活，可写复杂逻辑。
                </div>
                <div class="rule-help" v-if="r.kind === 'depends'">
                  条件必填。填写表达式（可访问 <code>fm.字段ID</code>），表达式为真时该字段才必填。等同于 required 的"动态条件必填"模式，但独立配置更灵活。
                </div>
                <!-- kind=required：两种模式 —— 普通必填 / 动态条件必填（生产格式 required 为字符串） -->
                <div class="row-grow" v-if="r.kind === 'required'">
                  <radio-group
                    :value="getRequiredMode(r)"
                    @on-change="v => setRequiredMode(r, v)"
                    size="small"
                    type="button">
                    <radio label="bool"><span>普通必填 required:true</span></radio>
                    <radio label="expr"><span>动态条件必填 required:'表达式'</span></radio>
                  </radio-group>
                </div>
                <div class="row-grow" v-if="r.kind === 'required' && getRequiredMode(r) === 'bool'">
                  <i-checkbox :value="r.required === true" @on-change="v => setRequiredBool(r, v)">
                    <span style="font-size:12px;color:#888;">勾选后此字段为必填（生产默认勾选）</span>
                  </i-checkbox>
                </div>
                <div class="sub-item-vertical" v-if="r.kind === 'required' && getRequiredMode(r) === 'expr'">
                  <div class="row-grow">
                    <span style="font-size:12px;color:#888;flex-shrink:0;width:110px;">required 条件</span>
                    <span style="font-size:11px;color:#aaa;flex-shrink:0;">truthy 时必填</span>
                  </div>
                  <i-input
                    type="textarea"
                    :rows="2"
                    :value="typeof r.required === 'string' ? r.required : ''"
                    @input="v => setRequiredExpr(r, v)"
                    size="small"
                    placeholder="如 fm.indval_r3 != null && fm.indval_r3 != ''" />
                </div>
                <!-- kind=number/array：min/max -->
                <div class="row-grow" v-if="r.kind === 'number' || r.kind === 'array' || (advancedRules && (r.kind === 'string'))">
                  <input-number v-model="r.min" size="small" placeholder="min" style="flex:1;" />
                  <input-number v-model="r.max" size="small" placeholder="max" style="flex:1;" />
                </div>
                <!-- trigger：仅 required 和 array 用（mock 数据规律） -->
                <div class="row-grow" v-if="r.kind === 'required' || r.kind === 'array'">
                  <span style="font-size:12px;color:#888;flex-shrink:0;">触发时机 trigger</span>
                  <i-select v-model="r.trigger" size="small" clearable style="width:140px;flex:0 0 140px;" placeholder="默认=blur">
                    <i-option value="change">change</i-option>
                    <i-option value="blur">blur</i-option>
                  </i-select>
                  <span style="font-size:11px;color:#aaa;flex:1;">生产数据常见 trigger:'change'</span>
                </div>
                <!-- 以下为高级规则字段（advancedRules 开启时才显示） -->
                <div class="row-grow" v-if="advancedRules && r.kind === 'enum'">
                  <i-input v-model="r.enumStr" size="small" placeholder='枚举值，逗号分隔，如 A,B,C' style="flex:1;" @on-change="syncEnum(r)" />
                </div>
                <div class="row-grow" v-if="advancedRules && r.kind === 'pattern'">
                  <i-input v-model="r.pattern" size="small" placeholder='如 ^\d+$' style="flex:1;" />
                </div>
                <div class="row-grow" v-if="advancedRules && r.kind === 'len'">
                  <input-number v-model="r.len" size="small" placeholder="长度" style="flex:1;" />
                </div>
                <div class="sub-item-vertical" v-if="advancedRules && r.kind === 'custom'">
                  <i-input v-model="r.custom" type="textarea" :rows="2" size="small" placeholder='表达式，如 value >= bm && value <= bl' />
                </div>
                <div class="sub-item-vertical" v-if="advancedRules && r.kind === 'validator'">
                  <i-input v-model="r.validator" type="textarea" :rows="3" size="small" placeholder='函数体，参数 (value, fm, extra)，return true 校验通过' />
                </div>
                <div class="sub-item-vertical" v-if="advancedRules && r.kind === 'depends'">
                  <i-input v-model="r.depends" type="textarea" :rows="2" size="small" placeholder='条件表达式，如 bm_r42 != null' />
                </div>
                <div class="sub-item-vertical" v-if="advancedRules && (r.kind === 'custom' || r.kind === 'validator')">
                  <i-checkbox v-model="r.useDepends">附加条件 depends</i-checkbox>
                  <i-input v-show="r.useDepends" v-model="r.depends" type="textarea" :rows="2" size="small" placeholder="depends 表达式" />
                </div>
              </div>
              <div v-if="!validationRules.length" style="color:#999;font-size:12px;">尚未配置校验规则</div>
            </div>
          </div>

          <!-- 联动 linkage -->
          <div class="field-group" v-if="hasLinkage">
            <div class="field-group-title">
              联动 linkage
              <span class="badge-count">{{(cell.linkage || []).length}}</span>
              <i-button class="add-btn" size="small" type="primary" ghost @click="addLinkage">+ 添加触发</i-button>
            </div>
            <div class="sub-list">
              <div class="sub-item sub-item-vertical" v-for="(lk, li) in (cell.linkage || [])" :key="li">
                <div class="row-grow">
                  <span style="font-size:12px;color:#888;flex-shrink:0;">当选择</span>
                  <i-select v-model="lk.trigger" size="small" style="flex:1;" :placeholder="(cell.options && cell.options.length) ? '选择 trigger' : '先配置 options'">
                    <i-option v-for="opt in (cell.options || [])" :value="opt.value" :key="opt.value">{{opt.label}} ({{opt.value}})</i-option>
                  </i-select>
                  <span style="font-size:12px;color:#888;flex-shrink:0;">时执行</span>
                  <i-button class="sub-remove" size="small" type="error" ghost @click="removeLinkage(li)">×</i-button>
                </div>
                <div class="sub-list" style="padding-left:12px;">
                  <div class="sub-item" v-for="(a, ai) in lk.actions" :key="ai">
                    <div class="row-grow target-picker">
                      <i-select v-model="a.kind" size="small" class="target-act" @on-change="onActionKindChange(a)">
                        <i-option value="enable">启用 enable</i-option>
                        <i-option value="disable">禁用 disable</i-option>
                        <i-option value="show">显示 show</i-option>
                        <i-option value="hide">隐藏 hide</i-option>
                        <i-option value="clear">清空 clear</i-option>
                        <i-option value="setValue">设置值 setValue</i-option>
                        <i-option value="rowEnable">行启用 rowEnable</i-option>
                        <i-option value="rowDisable">行禁用 rowDisable</i-option>
                        <i-option value="rowClear">行清空 rowClear</i-option>
                      </i-select>
                      <i-select v-if="!a.kind || !a.kind.startsWith('row')" v-model="a.target" size="small" filterable class="target-id" placeholder="选择目标控件">
                        <i-option v-for="c in idChips" :value="c.id" :key="c.id">{{c.id}} ({{c.type}})</i-option>
                      </i-select>
                      <i-input v-if="a.kind === 'setValue'" v-model="a.value" size="small" class="target-val" placeholder="要设置的值" />
                    </div>
                    <i-button class="sub-remove" size="small" type="error" ghost @click="removeAction(li, ai)">×</i-button>
                  </div>
                </div>
                <!-- rowTargets 嵌套（当 actions 中有 row* 类型时展示） -->
                <div v-for="(a, ai) in lk.actions" :key="'rt-'+ai" v-if="a.kind && a.kind.startsWith('row')">
                  <div style="font-size:12px;color:#888;margin:6px 0 4px 12px;">「{{a.kind}}」行绑定 rowTargets：</div>
                  <div class="row-target-list" style="padding-left:12px;">
                    <div class="row-target-item" v-for="(rt, ri) in (a.rowTargets || [])" :key="ri">
                      <input-number v-model="rt.row" size="small" :min="1" class="row-num" placeholder="行号" />
                      <i-select v-model="rt.cols" size="small" multiple filterable class="cols-input" placeholder="选择该行被作用的控件">
                        <i-option v-for="c in idChips" :value="c.id" :key="c.id">{{c.id}} ({{c.type}})</i-option>
                      </i-select>
                      <i-button class="sub-remove" size="small" type="error" ghost @click="removeRowTarget(a, ri)">×</i-button>
                    </div>
                  </div>
                  <div style="padding-left:12px;margin-top:4px;">
                    <i-button size="small" @click="addRowTarget(a)">+ 添加行</i-button>
                  </div>
                </div>
                <div style="padding-left:12px;margin-top:4px;">
                  <i-button size="small" @click="addAction(lk)">+ 添加动作</i-button>
                </div>
              </div>
              <div v-if="!(cell.linkage && cell.linkage.length)" style="color:#999;font-size:12px;">尚未配置联动</div>
            </div>
          </div>

          <!-- 事件 events -->
          <div class="field-group" v-if="hasEvents">
            <div class="field-group-title">
              事件 events
              <span style="font-size:11px;color:#aaa;margin-left:8px;">函数签名 <code style="background:#eef2f8;padding:1px 4px;border-radius:2px;">(value, fm, extra, rawEvent) => { 函数体 }</code></span>
            </div>
            <div class="event-params-doc">
              <div class="event-param-row">
                <code class="param-name">value</code>
                <span class="param-type">any</span>
                <span class="param-desc">当前字段的新值（已写入 fm[id]，可直接用 <code>value</code> 或 <code>fm.当前字段ID</code>）</span>
              </div>
              <div class="event-param-row">
                <code class="param-name">fm</code>
                <span class="param-type">object</span>
                <span class="param-desc">整个表单 model 对象。<b style="color:#2d8cf0;">可读可写</b>：<code>fm.total</code> 读其他字段，<code>fm.total = 100</code> 写入其他字段（触发响应式）</span>
              </div>
              <div class="event-param-row">
                <code class="param-name">extra</code>
                <span class="param-type">object</span>
                <span class="param-desc"><code>{ cell, cellMap }</code>：cell=当前字段配置，cellMap=所有字段的 id → cell 字典（可遍历其他字段）</span>
              </div>
              <div class="event-param-row">
                <code class="param-name">rawEvent</code>
                <span class="param-type">iView 原参</span>
                <span class="param-desc">随控件类型变化：
                  <span class="raw-event-list">
                    <span><b>input/number/select/radio/checkbox</b>：选中值</span>
                    <span><b>date</b>：<code>{ date: Date对象, label: '2026-06-22' }</code></span>
                    <span><b>input on-blur</b>：原生 <code>FocusEvent</code></span>
                    <span><b>input onInput</b>：输入字符串</span>
                  </span>
                </span>
              </div>
            </div>
            <div class="sub-list">
              <div class="sub-item sub-item-vertical">
                <div class="row-grow">
                  <span style="font-size:12px;color:#888;width:90px;flex-shrink:0;font-weight:bold;">onChange</span>
                  <span style="font-size:11px;color:#aaa;flex:1;">值变化后触发（所有控件通用）。常用于跨字段重算 / 联动赋值</span>
                </div>
                <i-input :value="(cell.events || {}).onChange" @input="v => setEvent('onChange', v)" type="textarea" :rows="3"
                  size="small" placeholder="如：fm.total = (Number(fm.a)||0) + (Number(fm.b)||0)" />
              </div>
              <div class="sub-item sub-item-vertical" v-if="cell.type === 'input'">
                <div class="row-grow">
                  <span style="font-size:12px;color:#888;width:90px;flex-shrink:0;font-weight:bold;">onBlur</span>
                  <span style="font-size:11px;color:#aaa;flex:1;">输入框失焦时触发。适合做格式化（trim / 大小写）</span>
                </div>
                <i-input :value="(cell.events || {}).onBlur" @input="v => setEvent('onBlur', v)" type="textarea" :rows="2"
                  size="small" placeholder="如：fm.indval_r3 = (fm.indval_r3 || '').trim()" />
              </div>
              <div class="sub-item sub-item-vertical" v-if="cell.type === 'input'">
                <div class="row-grow">
                  <span style="font-size:12px;color:#888;width:90px;flex-shrink:0;font-weight:bold;">onInput</span>
                  <span style="font-size:11px;color:#aaa;flex:1;">输入中触发（每字符）。高频，慎用重逻辑</span>
                </div>
                <i-input :value="(cell.events || {}).onInput" @input="v => setEvent('onInput', v)" type="textarea" :rows="2"
                  size="small" placeholder="如：fm.upper = String(fm.indval_r3 || '').toUpperCase()" />
              </div>
            </div>
            <div class="rule-help">
              <b>写法示例：</b>
              <code>fm.total = (Number(fm.a)||0) + (Number(fm.b)||0)</code>（跨字段重算）·
              <code>fm.date_str = rawEvent.date ? rawEvent.date.toISOString() : ''</code>（date-picker 拿 Date 对象）·
              <code>if (fm.score > 80) fm.level = 'A'</code>（条件赋值）。
              失败静默（仅 <code>console.error</code>，不中断主流程）。
            </div>
          </div>

          <!-- 状态开关（4 选 1） -->
          <div class="field-group">
            <div class="field-group-title">
              状态
              <span style="font-size:11px;color:#888;font-weight:normal;margin-left:6px;">单选：只可同时启用一种</span>
            </div>
            <div class="state-radio-row">
              <radio-group :value="visibilityState" @on-change="setVisibilityState">
                <radio label="normal"><span>正常</span></radio>
                <radio label="disabled"><span>只读 disabled</span></radio>
                <radio label="portalHide"><span>门户端隐藏 portalHide</span></radio>
                <radio label="platformHide"><span>管理端隐藏 platformHide</span></radio>
                <radio label="dualHide"><span>双端隐藏 portalHide+platformHide</span></radio>
              </radio-group>
            </div>
            <div style="margin-top:6px;">
              <i-checkbox :value="!!cell._hidden" @on-change="v => toggleFlag('_hidden', v)">
                <span style="font-size:12px;color:#888;">调试用：内部隐藏 _hidden（任何模式都不显示）</span>
              </i-checkbox>
            </div>
          </div>
        </div>
      </div>
    </script>

    <!-- ==================== 预览渲染子组件模板（替代 iframe）==================== -->
    <script type="text/x-template" id="preview-renderer-tpl">
      <div class="preview-renderer">
        <div class="table-wrapper">
          <i-form ref="mainForm" :model="fm" :rules="formRules" :validate-on-rule-change="false">
            <table>
              <colgroup>
                <col class="axis-col-width">
                <col v-for="(w,i) in colWidths" :key="i" :style="w">
              </colgroup>
              <tr class="axis-row-top">
                <th class="axis-corner"></th>
                <th v-for="c in colCount" :key="'ax-c-'+c" class="axis-col-head">{{c}}</th>
              </tr>
              <tr v-for="(row, ri) in gridRows" v-if="isRowVisible(ri)" :key="ri">
                <td class="axis-row-head">{{ri+1}}</td>
                <template v-for="(entry, ci) in row">
                  <th v-if="entry.isLabel && !entry.skip && !isHidden(entry.cell.id)"
                      :colspan="entry.colspan" :rowspan="entry.rowspan" :key="ci">
                    <span class="cell-id-badge label-badge" @click.stop="onIdClick(entry.cell.id)">{{entry.cell.id}}</span>
                    <div v-if="entry.cell.clampLines > 0" class="cell-clamp" :style="clampStyle(entry.cell.clampLines)" v-html="entry.cell.content"></div>
                    <div v-else v-html="entry.cell.content"></div>
                  </th>
                  <td v-else-if="!entry.skip && entry.cell && !isHidden(entry.cell.id)"
                      :colspan="entry.colspan" :rowspan="entry.rowspan" :key="ci"
                      :class="entry.cls">
                    <span class="cell-id-badge" @click.stop="onIdClick(entry.cell.id)">{{entry.cell.id}}</span>
                    <div v-for="item in getItems(entry)" :key="item.cell.id"
                         :data-cell-id="item.cell.id"
                         class="alt-item">
                      <div v-if="item.isText && item.cell.clampLines > 0" class="cell-clamp" :style="clampStyle(item.cell.clampLines)" v-html="item.cell.content || ''"></div>
                      <div v-else-if="item.isText" v-html="item.cell.content || ''"></div>
                      <span v-else-if="item.isFormula" class="formula-val">{{formulaResults[item.cell.id]}}</span>
                      <form-item v-else-if="item.isControl" :prop="formRules[item.cell.id] ? item.cell.id : ''">
                        <i-input v-if="item.cell.type==='input'"
                          :value="fm[item.cell.id]"
                          @input="val => { setVal(item.cell.id, val); onInput(item.cell.id, val); }"
                          :placeholder="item.cell.placeholder || item.cell.content || ''"
                          :disabled="isDisabled(item.cell.id)"
                          @on-blur="e => onBlur(item.cell.id, e)" />
                        <input-number v-if="item.cell.type==='number'"
                          :value="fm[item.cell.id]"
                          @on-change="val => { setVal(item.cell.id, val); onChange(item.cell.id, val); }"
                          :placeholder="item.cell.placeholder || ''"
                          :min="getNum(item.cell, 'min')"
                          :max="getNum(item.cell, 'max')"
                          :disabled="isDisabled(item.cell.id)"
                          style="width:100%" />
                        <i-select v-if="item.cell.type==='select'"
                          :value="fm[item.cell.id]"
                          @on-change="val => { setVal(item.cell.id, val); onChange(item.cell.id, val); }"
                          :placeholder="item.cell.content || '请选择'"
                          :disabled="isDisabled(item.cell.id)"
                          clearable>
                          <i-option v-for="opt in (item.cell.options||[])" :value="opt.value" :key="opt.value">{{opt.label}}</i-option>
                        </i-select>
                        <div v-if="item.cell.type==='radio'" class="radio-in-cell">
                          <radio-group :value="fm[item.cell.id]" @on-change="val => { setVal(item.cell.id, val); onChange(item.cell.id, val); }" vertical>
                            <radio v-for="opt in (item.cell.options||[])" :label="opt.value" :key="opt.value" :disabled="isDisabled(item.cell.id)">
                              <span v-html="opt.label"></span>
                            </radio>
                          </radio-group>
                        </div>
                        <checkbox-group v-if="item.cell.type==='checkbox'"
                          :value="fm[item.cell.id]"
                          @on-change="val => { setVal(item.cell.id, val); onChange(item.cell.id, val); }">

      function serializeRule(r) {
        var out = {};
        var k = r.kind || 'required';
        if (r.message) out.message = r.message;
        if (k === 'required') {
          out.required = true;
        } else if (k === 'number') {
          out.type = 'number';
          if (r.min != null && r.min !== '') out.min = Number(r.min);
          if (r.max != null && r.max !== '') out.max = Number(r.max);
        } else if (k === 'string') {
          out.type = 'string';
          if (r.min != null && r.min !== '') out.min = Number(r.min);
          if (r.max != null && r.max !== '') out.max = Number(r.max);
        } else if (k === 'array') {
          out.type = 'array';
          if (r.min != null && r.min !== '') out.min = Number(r.min);
          if (r.max != null && r.max !== '') out.max = Number(r.max);
        } else if (k === 'pattern') {
          if (r.pattern) out.pattern = r.pattern;
        } else if (k === 'len') {
          if (r.len != null && r.len !== '') out.len = Number(r.len);
        } else if (k === 'enum') {
          var arr = Array.isArray(r.enum) ? r.enum.slice()
            : String(r.enumStr == null ? '' : r.enumStr).split(',').map(function (s) { return s.trim(); }).filter(Boolean);
          if (arr.length) out.enum = arr;
        } else if (k === 'custom') {
          if (r.custom) out.custom = r.custom;
          if (r.useDepends && r.depends) out.depends = r.depends;
        } else if (k === 'validator') {
          if (r.validator) out.validator = r.validator;
          if (r.useDepends && r.depends) out.depends = r.depends;
        } else if (k === 'depends') {
          out.required = true;
          if (r.depends) out.depends = r.depends;
        }
        return out;
      }

      function serializeAction(a) {
        var out = { type: a.kind };
        if (a.kind === 'setValue') {
          out.target = a.target;
          out.value = a.value != null ? a.value : '';
        } else if (a.kind.indexOf('row') === 0) {
          out.rowTargets = (a.rowTargets || []).filter(function (rt) { return rt.row && rt.cols && rt.cols.length; });
        } else {
          out.target = a.target;
        }
        return out;
      }

      // 兼容三种粘贴格式：
      // 1) 严格 JSON：{"title": "...", "cells": [...]}
      // 2) JS 文件：var MOCK_DATA = {...};（含注释）
      // 3) JS 对象字面量：{title: "...", cells: [...]}（无引号键）
      function parseConfigText(text) {
        // 1. 纯 JSON
        try {
          return JSON.parse(text);
        } catch (e) { /* fallthrough */ }
        // 2. var NAME = {...}; 形式
        var m = text.match(/var\s+([a-zA-Z_$][\w$]*)\s*=/);
        if (m) {
          var name = m[1];
          try {
            /* eslint-disable no-new-func */
            var fn = new Function(text + '; return typeof ' + name + ' !== "undefined" ? ' + name + ' : null;');
            /* eslint-enable no-new-func */
            var data = fn();
            if (data && typeof data === 'object') return data;
          } catch (e) { /* fallthrough */ }
        }
        // 3. 裸对象字面量
        try {
          /* eslint-disable no-new-func */
          var fn2 = new Function('return (' + text + ');');
          /* eslint-enable no-new-func */
          var data2 = fn2();
          if (data2 && typeof data2 === 'object') return data2;
        } catch (e2) { /* fallthrough */ }
        throw new Error('无法识别的内容格式（支持 JSON、var X = {...}、对象字面量）');
      }

      function inferRuleKind(r) {
        if (r.validator) r.kind = 'validator';
        else if (r.custom) r.kind = 'custom';
        else if (r.depends && r.required) r.kind = 'depends';
        else if (r.depends) r.kind = 'custom', r.custom = '';
        else if (r.enum) { r.kind = 'enum'; r.enumStr = (Array.isArray(r.enum) ? r.enum : []).join(','); }
        else if (r.pattern) r.kind = 'pattern';
        else if (r.len != null) r.kind = 'len';
        else if (r.type === 'array') r.kind = 'array';
        else if (r.type === 'string') r.kind = 'string';
        else if (r.type === 'number' && (r.min != null || r.max != null)) r.kind = 'number';
        else r.kind = 'required';
        if (r.depends && (r.kind === 'custom' || r.kind === 'validator')) r.useDepends = true;
      }

      function inferActionKind(a) {
        a.kind = a.type;
        if (a.target) {} // 单目标已存在
        if (a.type && a.type.indexOf('row') === 0) {
          if (!a.rowTargets) a.rowTargets = [];
          a.rowTargets.forEach(function (rt) {
            if (!Array.isArray(rt.cols)) rt.cols = [];
            if (rt.row == null) rt.row = 1;
          });
        }
      }

      function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
      }
    </script>
  </body>
</html>
