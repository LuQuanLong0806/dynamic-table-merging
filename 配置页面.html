<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>动态表格配置器</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/view-design@4.7.0/dist/styles/iview.css"
      onerror="
        this.onerror = null;
        this.href = 'https://unpkg.com/view-design@4.7.0/dist/styles/iview.css';
      "
    />
    <style>
      * {
        box-sizing: border-box;
        font-family: 'Microsoft YaHei', sans-serif;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        background: #f0f2f5;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* ===== 顶部 ===== */
      .app-header {
        background: #fff;
        border-bottom: 1px solid #e8e8e8;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        z-index: 10;
      }
      .app-header .logo {
        font-size: 17px;
        font-weight: bold;
        color: #2a5db0;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .app-header .logo .dot {
        width: 8px;
        height: 8px;
        background: #19be6b;
        border-radius: 50%;
        display: inline-block;
      }
      .app-header .title-input {
        width: 280px;
      }
      .app-header .freeze-rows-field {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #515a6e;
        white-space: nowrap;
      }
      .app-header .freeze-rows-field .ivu-input-number {
        width: 84px;
      }
      .app-header .actions {
        display: flex;
        gap: 6px;
        margin-left: auto;
        align-items: center;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .app-header .actions .action-divider {
        width: 1px;
        height: 18px;
        background: #d9d9d9;
        margin: 0 2px;
        flex-shrink: 0;
      }

      /* ===== 主体 ===== */
      .app-main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      /* ===== 预览面板（全宽） ===== */
      .preview-panel--full {
        flex: 1;
        width: 100%;
      }
      .toolbar-divider {
        width: 1px;
        height: 18px;
        background: #e0e0e0;
        margin: 0 6px;
      }
      .state-radio-row {
        padding: 4px 0;
      }
      .state-radio-row .ivu-radio-wrapper {
        margin-right: 16px;
      }
      .template-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .template-card {
        border: 1px solid #e8e8e8;
        border-radius: 6px;
        padding: 14px 10px;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        background: #fff;
      }
      .template-card:hover {
        border-color: #2d8cf0;
        background: #f0f7ff;
        transform: translateY(-1px);
        box-shadow: 0 2px 8px rgba(45, 140, 240, 0.15);
      }
      .template-card .template-icon {
        font-size: 28px;
        line-height: 1;
        margin-bottom: 6px;
      }
      .template-card .template-name {
        font-size: 13px;
        font-weight: 600;
        color: #333;
        margin-bottom: 4px;
      }
      .template-card .template-desc {
        font-size: 11px;
        color: #888;
        line-height: 1.4;
      }
      .stat-chip {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        font-size: 12px;
        color: #515a6e;
        background: #f5f7fa;
        border-radius: 10px;
        border: 1px solid #e8eaec;
      }
      .stat-chip.stat-warn {
        color: #ed4014;
        background: #fff1f0;
        border-color: #ffccc7;
      }

      .cell-list {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
      }
      .cell-list--drawer {
        padding: 4px 0;
      }
      .list-drawer-toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 0 12px;
        border-bottom: 1px solid #e8e8e8;
        margin-bottom: 12px;
      }
      .list-drawer-toolbar .spacer { flex: 1; }
      .empty-state {
        padding: 80px 20px;
        text-align: center;
        color: #999;
      }
      .empty-state .icon {
        font-size: 48px;
        color: #d9d9d9;
        margin-bottom: 12px;
      }

      /* ===== 单元格卡片 ===== */
      .cell-card {
        background: #fff;
        border: 1px solid #e8e8e8;
        border-radius: 6px;
        margin-bottom: 8px;
        transition: box-shadow 0.2s, border-color 0.2s;
      }
      .cell-card:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }
      .cell-card.expanded {
        border-color: #2a5db0;
        box-shadow: 0 2px 10px rgba(42, 93, 176, 0.12);
      }
      .cell-card.has-error {
        border-color: #ffccc7;
      }
      .cell-card.has-error.expanded {
        border-color: #ed4014;
      }
      .cell-card.flash {
        animation: card-flash 1.4s ease-out;
      }
      @keyframes card-flash {
        0%   { box-shadow: 0 0 0 0 rgba(25,190,107,0.0); border-color:#2a5db0; }
        15%  { box-shadow: 0 0 0 6px rgba(25,190,107,0.55); border-color:#19be6b; }
        100% { box-shadow: 0 0 0 0 rgba(25,190,107,0.0); border-color:#2a5db0; }
      }
      .demo-spin-icon-load {
        animation: ani-demo-spin 1s linear infinite;
      }
      @keyframes ani-demo-spin {
        from { transform: rotate(0deg); }
        50%  { transform: rotate(180deg); }
        to   { transform: rotate(360deg); }
      }
      /* 抽屉里的卡片：去除折叠头部动画，body 总展开 */
      .edit-drawer .cell-card { margin-bottom: 0; }
      .edit-drawer .cell-card .cell-toggle { display: none; }
      .edit-drawer .cell-card .cell-header { cursor: default; background: #f5f7fa; }
      .edit-drawer .ivu-drawer-body { padding: 12px; background: #fafafa; display: flex; flex-direction: column; }
      .edit-drawer-footer {
        position: sticky; bottom: 0;
        margin: 12px -12px -12px;
        padding: 10px 12px;
        background: #fff;
        border-top: 1px solid #e8eaec;
        display: flex; align-items: center; justify-content: space-between;
        gap: 12px;
      }
      .edit-save-status {
        font-size: 12px; color: #888;
        display: inline-flex; align-items: center; gap: 6px;
      }
      .edit-save-status .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #c5c8ce;
      }
      .edit-save-status.synced { color: #19be6b; }
      .edit-save-status.synced .dot { background: #19be6b; }
      .edit-save-status.dirty:not(.synced) { color: #ff9900; }
      .edit-save-status.dirty:not(.synced) .dot { background: #ff9900; }
      .edit-drawer-actions { display: flex; align-items: center; gap: 12px; }
      .revert-link { font-size: 12px; color: #ed4014; }
      .revert-link.disabled { color: #c5c8ce; cursor: not-allowed; text-decoration: none; }
      .cell-header {
        display: flex;
        align-items: center;
        padding: 8px 12px;
        cursor: pointer;
        gap: 8px;
        user-select: none;
      }
      .cell-toggle {
        color: #999;
        transition: transform 0.2s;
        width: 14px;
        text-align: center;
        font-size: 12px;
      }
      .cell-card.expanded .cell-toggle {
        transform: rotate(90deg);
        color: #2a5db0;
      }
      .cell-id-tag {
        background: #e6f0ff;
        color: #2a5db0;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
        font-family: Consolas, monospace;
        flex-shrink: 0;
      }
      .cell-id-tag.duplicate {
        background: #fff1f0;
        color: #cf1322;
      }
      .cell-id-tag.empty {
        background: #fff7e6;
        color: #d46b08;
      }
      .cell-type-tag {
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        color: #fff;
        flex-shrink: 0;
        line-height: 1.4;
      }
      .cell-type-tag.label {
        background: #888;
      }
      .cell-type-tag.text {
        background: #2db7f5;
      }
      .cell-type-tag.input {
        background: #19be6b;
      }
      .cell-type-tag.number {
        background: #ed4014;
      }
      .cell-type-tag.select {
        background: #ff9900;
      }
      .cell-type-tag.radio {
        background: #5cadff;
      }
      .cell-type-tag.checkbox {
        background: #6c5ce7;
      }
      .cell-type-tag.date {
        background: #00b894;
      }
      .cell-type-tag.upload {
        background: #fd79a8;
      }
      .cell-type-tag.formula {
        background: #e17055;
      }
      .cell-coord {
        color: #888;
        font-size: 12px;
        font-family: Consolas, monospace;
        flex-shrink: 0;
        background: #f5f5f5;
        padding: 2px 6px;
        border-radius: 3px;
      }
      .cell-preview {
        color: #555;
        font-size: 12px;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }
      .cell-actions {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
      }
      .cell-actions .ivu-btn {
        padding: 0 8px;
        height: 24px;
        line-height: 22px;
        font-size: 12px;
      }
      .cell-body {
        padding: 12px 16px 14px;
        border-top: 1px solid #f0f0f0;
        background: #fcfcfd;
      }
      .field-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px 12px;
      }
      .field-grid > div {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
      }
      .field-grid-2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px 12px;
      }
      .field-grid-2 > div {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
      }
      .field-label {
        display: block;
        font-size: 11px;
        color: #888;
        line-height: 1.4;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .field-grid .full {
        grid-column: 1 / -1;
      }
      .field-grid .span2 {
        grid-column: span 2;
      }
      .field-group {
        margin-top: 12px;
        padding-top: 10px;
        border-top: 1px dashed #e8e8e8;
      }
      .field-group-title {
        font-size: 13px;
        font-weight: bold;
        color: #2a5db0;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .field-group-title .badge-count {
        background: #e6f0ff;
        color: #2a5db0;
        padding: 0 6px;
        border-radius: 8px;
        font-size: 11px;
        line-height: 16px;
      }
      .field-group-title .add-btn {
        margin-left: auto;
      }

      /* ===== 预览面板 ===== */
      .preview-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #f5f7fa;
        overflow: hidden;
        min-width: 0;
      }
      .preview-toolbar {
        padding: 8px 16px;
        background: #fff;
        border-bottom: 1px solid #e8e8e8;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .preview-toolbar .spacer {
        flex: 1;
      }
      .preview-toolbar .auto-tip {
        font-size: 12px;
        color: #888;
      }
      .preview-frame-wrap {
        flex: 1;
        overflow: hidden;
        padding: 12px;
        position: relative;
      }
      /* ===== 子列表编辑器（options/rules/actions） ===== */
      .sub-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .sub-item {
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 6px;
        background: #fff;
        border: 1px solid #f0f0f0;
        border-radius: 4px;
      }
      .sub-item .row-grow {
        flex: 1;
        display: flex;
        gap: 4px;
        align-items: center;
        min-width: 0;
      }
      .sub-item .row-grow .ivu-input-wrapper,
      .sub-item .row-grow .ivu-select,
      .sub-item .row-grow .ivu-input-number,
      .sub-item .row-grow .ivu-date-picker {
        flex: 1;
        min-width: 0;
      }
      .sub-item .sub-remove {
        flex-shrink: 0;
      }
      .sub-item-vertical {
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
      }
      .sub-item-vertical .row-grow {
        width: 100%;
      }
      .rule-help {
        background: #f0f5ff;
        border-left: 3px solid #2d8cf0;
        padding: 5px 8px;
        font-size: 11px;
        line-height: 1.6;
        color: #515a6e;
        border-radius: 0 3px 3px 0;
      }
      .rule-help code {
        background: #e8edf5;
        padding: 0 4px;
        border-radius: 2px;
        font-family: 'Consolas', monospace;
        font-size: 11px;
        color: #2a5db0;
      }
      .rule-help b {
        color: #2d8cf0;
      }
      .event-params-doc {
        background: #fafbfc;
        border: 1px solid #e8eaec;
        border-radius: 3px;
        padding: 6px 8px;
        margin-bottom: 6px;
      }
      .event-param-row {
        display: flex;
        align-items: flex-start;
        gap: 6px;
        font-size: 11px;
        line-height: 1.6;
        padding: 2px 0;
        color: #515a6e;
      }
      .event-param-row .param-name {
        background: #e8edf5;
        color: #2a5db0;
        padding: 0 6px;
        border-radius: 2px;
        font-family: 'Consolas', monospace;
        flex-shrink: 0;
        min-width: 70px;
        text-align: center;
      }
      .event-param-row .param-type {
        color: #888;
        flex-shrink: 0;
        min-width: 75px;
        font-style: italic;
      }
      .event-param-row .param-desc {
        flex: 1;
      }
      .event-param-row .param-desc code {
        background: #e8edf5;
        padding: 0 3px;
        border-radius: 2px;
        font-family: 'Consolas', monospace;
        color: #2a5db0;
      }
      .event-param-row .raw-event-list {
        display: flex;
        flex-direction: column;
        gap: 1px;
        margin-top: 2px;
        padding-left: 4px;
        border-left: 2px solid #e8eaec;
      }
      .target-picker {
        display: flex;
        gap: 4px;
        align-items: center;
        flex-wrap: wrap;
      }
      .target-picker .target-id {
        flex: 1;
        min-width: 120px;
      }
      .target-picker .target-act {
        width: 100px;
      }
      .target-picker .target-val {
        flex: 1;
        min-width: 80px;
      }

      .row-target-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-top: 4px;
      }
      .row-target-item {
        display: flex;
        gap: 4px;
        align-items: center;
        padding: 4px 6px;
        background: #f9f9f9;
        border-radius: 3px;
        font-size: 12px;
      }
      .row-target-item .row-num {
        width: 80px;
        flex-shrink: 0;
      }
      .row-target-item .cols-input {
        flex: 1;
      }
      .row-target-item .sub-remove {
        flex-shrink: 0;
      }

      /* ===== 表达式辅助 ===== */
      .expr-hint {
        margin-top: 4px;
        font-size: 11px;
        color: #999;
      }
      .expr-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 4px;
      }
      .expr-chip {
        background: #f0f5ff;
        color: #2a5db0;
        padding: 1px 6px;
        border-radius: 10px;
        font-size: 11px;
        cursor: pointer;
        font-family: Consolas, monospace;
        border: 1px solid #d6e4ff;
        transition: background 0.15s;
      }
      .expr-chip:hover {
        background: #d6e4ff;
      }
      .expr-chip.tpl {
        background: #f6ffed;
        color: #389e0d;
        border-color: #b7eb8f;
      }
      .expr-chip.tpl:hover {
        background: #b7eb8f;
      }

      /* ===== JSON 弹窗 ===== */
      .json-modal-textarea .ivu-input {
        font-family: Consolas, monospace;
        font-size: 12px;
      }

      /* ===== 使用说明弹窗 ===== */
      .help-content { font-size: 13px; line-height: 1.7; color: #333; max-height: 70vh; overflow-y: auto; padding-right: 8px; }
      .help-content h3 { margin: 18px 0 8px; padding-bottom: 4px; border-bottom: 1px solid #e8eaec; color: #19be6b; font-size: 14px; }
      .help-content h3:first-child { margin-top: 0; }
      .help-content p { margin: 4px 0; }
      .help-content ul, .help-content ol { margin: 4px 0 4px 20px; padding: 0; }
      .help-content li { margin: 2px 0; }
      .help-content code { background: #f5f7fa; padding: 1px 5px; border-radius: 3px; font-family: Consolas, monospace; font-size: 12px; color: #c5302b; }
      .help-content b { color: #2a5db0; }

      .size-mini .ivu-btn {
        padding: 0 8px;
        height: 22px;
        line-height: 20px;
        font-size: 11px;
      }

      /* 滚动条美化 */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.15);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 0, 0, 0.3);
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }

      /* ==================== 预览渲染子组件（替代 iframe）样式 ==================== */
      .preview-renderer {
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
      }
      .preview-renderer .table-wrapper {
        overflow: auto;
        flex: 1;
        min-height: 0;
        background: #fff;
        padding: 8px;
      }
      .preview-renderer .axis-row-top {
        position: sticky;
        top: 0;
        z-index: 2;
      }
      .preview-renderer .row-freeze {
        position: sticky;
        top: 20px;            /* 让位给 axis-row-top（行号头高度约 20px） */
        z-index: 1;            /* 低于 axis，不破坏调试坐标轴 */
      }
      .preview-renderer .axis-row-head {
        position: sticky;
        left: 0;
        z-index: 2;
      }
      .preview-renderer .axis-corner {
        position: sticky;
        top: 0;
        left: 0;
        z-index: 3;
      }
      .preview-renderer .axis-col-width {
        width: 34px;
      }
      .preview-renderer .axis-corner,
      .preview-renderer .axis-col-head,
      .preview-renderer .axis-row-head {
        background: #f5f7fa !important;
        color: #909399 !important;
        font-size: 11px !important;
        font-weight: normal !important;
        padding: 2px 4px !important;
        text-align: center !important;
        border-color: #d0d7de !important;
        user-select: none;
      }
      .preview-renderer .axis-corner {
        background: #ebeef5 !important;
      }
      .preview-renderer table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        word-break: break-word;
      }
      .preview-renderer th,
      .preview-renderer td {
        border: 1px solid #999;
        padding: 6px 8px;
        text-align: center;
        vertical-align: middle;
        font-size: 13px;
        line-height: 1.5;
        position: relative;
      }
      .preview-renderer th {
        background: #d0d8e8;
        font-weight: bold;
        white-space: pre-line;
      }
      .preview-renderer td {
        background: #fff;
        white-space: pre-line;
      }
      .preview-renderer tr:hover td {
        background: #f0f5ff;
      }
      .preview-renderer .cell-group {
        background: #e8edf5;
        font-weight: bold;
      }
      .preview-renderer .cell-clamp {
        display: -webkit-box;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
        word-break: break-word;
        line-height: 1.5;
      }
      .preview-renderer .alt-item {
        width: 100%;
      }
      .preview-renderer .formula-val {
        font-weight: bold;
        color: #2a5db0;
        font-size: 15px;
      }
      .preview-renderer td .ivu-form-item {
        margin-bottom: 0;
      }
      .preview-renderer td .ivu-form-item-error-tip {
        position: relative;
        padding-top: 2px;
        font-size: 11px;
      }
      .preview-renderer td .ivu-input-number,
      .preview-renderer td .ivu-select {
        width: 100%;
      }
      .preview-renderer .radio-in-cell {
        text-align: left;
        padding: 2px 0;
      }
      .preview-renderer .radio-in-cell .ivu-radio-group {
        display: flex !important;
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      .preview-renderer .radio-in-cell .ivu-radio-wrapper {
        white-space: normal !important;
        height: auto !important;
        line-height: 1.5 !important;
        display: block !important;
        margin-right: 0;
      }
      .preview-renderer .radio-in-cell .ivu-radio-wrapper > .ivu-radio {
        vertical-align: top;
        margin-top: 2px;
      }
      .preview-renderer .cell-id-badge {
        position: absolute;
        top: 0;
        left: 0;
        font-size: 9px;
        line-height: 1;
        color: #fff;
        background: rgba(45, 140, 240, 0.7);
        padding: 1px 3px;
        border-radius: 0 0 3px 0;
        z-index: 1;
        cursor: pointer;
        white-space: nowrap;
        max-width: 80px;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: background 0.15s;
      }
      .preview-renderer .cell-id-badge:hover {
        background: rgba(45, 140, 240, 1);
      }
      .preview-renderer .cell-id-badge.label-badge {
        background: rgba(140, 140, 140, 0.65);
      }
      .preview-renderer .cell-id-badge.label-badge:hover {
        background: rgba(100, 100, 100, 0.9);
      }
      .preview-renderer .cell-edit-icon {
        position: absolute;
        bottom: 2px;
        right: 2px;
        width: 18px;
        height: 18px;
        line-height: 18px;
        text-align: center;
        color: #fff;
        background: rgba(45, 140, 240, 0.85);
        border-radius: 3px;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.15s, background 0.15s;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .preview-renderer .cell-edit-icon:hover {
        background: rgba(45, 140, 240, 1);
      }
      .preview-renderer th:hover .cell-edit-icon,
      .preview-renderer td:hover .cell-edit-icon {
        opacity: 1;
      }
      .preview-renderer .upload-in-cell {
        text-align: left;
        padding: 2px 0;
      }
      .preview-renderer .upload-link {
        text-decoration: underline;
        color: #2a5db0;
        cursor: pointer;
      }
      .preview-renderer .uploaded-file {
        display: flex;
        align-items: center;
        margin-top: 4px;
        gap: 4px;
      }
      .preview-renderer .remove-file-icon {
        cursor: pointer;
        color: #999;
        font-size: 16px;
      }
      .preview-renderer .remove-file-icon:hover {
        color: #ed4014;
      }
      .preview-renderer .preview-empty {
        padding: 60px 20px;
        text-align: center;
        color: #999;
      }
      .preview-renderer .empty-cell-slot {
        position: relative;
        background: repeating-linear-gradient(
          45deg,
          #fafafa,
          #fafafa 6px,
          #f0f0f0 6px,
          #f0f0f0 12px
        );
        min-width: 30px;
        min-height: 24px;
      }
      .preview-renderer .empty-cell-slot .cell-edit-icon {
        opacity: 1;
        background: rgba(180, 180, 180, 0.7);
      }
      .preview-renderer .empty-cell-slot .cell-edit-icon:hover {
        background: rgba(45, 140, 240, 1);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <!-- ==================== 主应用模板 ==================== -->
    <script type="text/x-template" id="app-tpl">
      <div class="app-root" style="display:flex;flex-direction:column;height:100vh;">
        <!-- 顶部 -->
        <header class="app-header">
          <div class="logo"><span class="dot"></span>动态表格配置器</div>
          <i-input
            v-model="config.title"
            placeholder="表格标题（对应 title 字段）"
            class="title-input"
            @on-change="schedulePreview"
          />
          <div class="freeze-rows-field">
            <span>表头固定</span>
            <input-number
              v-model="config.freezeRows"
              :min="0"
              :max="maxY"
              :step="1"
              size="small"
              @on-change="schedulePreview"
            />
            <span>行</span>
          </div>
          <div class="actions">
            <i-button type="primary" @click="showTemplateModal = true">+ 添加单元格</i-button>
            <i-button @click="showHelpModal = true">📖 使用说明</i-button>
            <i-button @click="showImportModal = true">导入 JSON</i-button>
            <i-button type="primary" @click="openExport">导出 JSON</i-button>
            <i-button @click="copyJSON">复制 JSON</i-button>
            <i-button @click="confirmClear">清空</i-button>
            <span class="action-divider"></span>
            <i-button size="small" @click="showInsertColModal = true">⟳ 插入列</i-button>
            <i-button size="small" @click="showInsertRowModal = true">⟳ 插入行</i-button>
            <i-button size="small" @click="showAppendColModal = true">➕ 追加列</i-button>
            <i-button size="small" @click="showAppendRowModal = true">➕ 追加行</i-button>
            <i-button size="small" @click="showDeleteColModal = true">✕ 删除列</i-button>
            <i-button size="small" @click="showDeleteRowModal = true">✕ 删除行</i-button>
            <i-button size="small" @click="openColVisModal">👁 列可见性</i-button>
            <span class="action-divider"></span>
            <i-button size="small" :disabled="!canUndo()" @click="undo">↶ 撤销</i-button>
            <i-button size="small" :disabled="!canRedo()" @click="redo">↷ 重做</i-button>
          </div>
        </header>

        <!-- 主体：预览占满全宽 -->
        <main class="app-main">
          <section class="preview-panel preview-panel--full">
            <div class="preview-toolbar">
              <span class="auto-tip">自动预览</span>
              <i-switch v-model="autoPreview" size="small" @on-change="onAutoToggle" />
              <span class="toolbar-divider"></span>
              <span class="auto-tip">视角</span>
              <radio-group v-model="previewMode" size="small" type="button">
                <radio label="all"><span>全部</span></radio>
                <radio label="portal"><span>门户端</span></radio>
                <radio label="platform"><span>管理端</span></radio>
              </radio-group>
              <span class="spacer"></span>
              <span class="stat-chip">单元格 {{config.cells.length}}</span>
              <span class="stat-chip">X {{maxX || '-'}}</span>
              <span class="stat-chip">Y {{maxY || '-'}}</span>
              <tooltip placement="bottom" transfer v-if="duplicateIds.length">
                <span class="stat-chip stat-warn">重复 {{duplicateIds.length}}</span>
                <div slot="content" style="white-space:normal;max-width:260px;">
                  <div style="font-weight:600;margin-bottom:4px;">重复的 ID:</div>
                  <div v-for="id in duplicateIds" :key="id" style="line-height:1.6;">• {{ id }}</div>
                </div>
              </tooltip>
              <span class="stat-chip stat-warn" v-if="emptyIdCount">缺ID {{emptyIdCount}}</span>
              <i-button size="small" @click="refreshPreview">刷新预览</i-button>
              <i-button size="small" v-if="false" @click="openInNewWindow">新窗口</i-button>
              <i-button size="small" @click="exportFile">下载 JSON</i-button>
            </div>
            <div class="preview-frame-wrap">
              <preview-renderer
                v-if="previewConfig && previewConfig.cells && previewConfig.cells.length"
                :config="previewConfig"
                :mode="previewMode"
                :grid-pad="gridPad"
                @click-id="focusCellById"
                @add-cell-at="onAddCellAt"
                @submit="onPreviewSubmit"
                @validate-fail="onPreviewValidateFail">
              </preview-renderer>
              <div v-else class="preview-empty">
                <div class="icon">▣</div>
                <div>暂无数据，导入 JSON 或添加单元格开始预览</div>
              </div>
            </div>
          </section>
        </main>

        <!-- 编辑抽屉：点击徽章打开 -->
        <drawer
          :value="editDrawerOpen"
          @on-close="closeEditDrawer"
          :width="520"
          :title="editDrawerTitle"
          :mask="true"
          :mask-closable="false"
          :transfer="true"
          class-name="edit-drawer"
        >
          <div v-if="!editDrawerCell" style="padding:24px;color:#999;text-align:center;">
            单元格已删除
          </div>
          <template v-else>
            <cell-card
              :cell="editDrawerCell"
              :index="editDrawerIndex"
              :total="config.cells.length"
              :all-cells="config.cells"
              :is-duplicate="duplicateIds.indexOf(editDrawerCell.id) >= 0"
              :expanded-set="expandedSet"
              @toggle="onToggle"
              @remove="onEditRemove"
              @move-up="onEditMove(-1)"
              @move-down="onEditMove(1)"
              @copy-id="copyId"
              @change="schedulePreview"
            ></cell-card>
            <div class="edit-drawer-footer">
              <div class="edit-save-status" :class="{ dirty: editDrawerDirty }">
                <template v-if="!editDrawerDirty">
                  <span class="dot"></span> 未修改
                </template>
                <template v-else>
                  <span class="dot"></span> 已修改，点"确定"写入表格
                </template>
              </div>
              <div class="edit-drawer-actions">
                <a
                  href="javascript:void(0)"
                  class="revert-link"
                  :class="{ disabled: !editDrawerDirty }"
                  @click="editDrawerDirty && revertEditDrawer()"
                >放弃修改</a>
                <i-button type="primary" size="small" @click="commitEditDrawer">确定</i-button>
              </div>
            </div>
          </template>
        </drawer>

        <!-- 列表抽屉：管理所有单元格（关闭时不渲染，避免大量 cell-card 常驻） -->
        <drawer
          v-model="listDrawerOpen"
          :width="560"
          title="单元格列表"
          :mask-closable="false"
          :transfer="true"
          class-name="list-drawer"
        >
          <template v-if="listDrawerOpen">
            <div class="list-drawer-toolbar">
              <i-button size="small" type="primary" @click="addCell">+ 添加</i-button>
              <i-button size="small" @click="toggleAll(true)">全展开</i-button>
              <i-button size="small" @click="toggleAll(false)">全折叠</i-button>
              <span class="spacer"></span>
              <span style="font-size:12px;color:#888;">点击卡片标题展开/收起；点徽章上的 ⚙ 直接编辑</span>
            </div>
            <div class="cell-list cell-list--drawer">
              <div v-if="!config.cells.length" class="empty-state">
                <div class="icon">▣</div>
                <div>暂无单元格，点击"+ 添加"或顶部"载入示例"开始</div>
              </div>
              <cell-card
                v-for="(cell, i) in config.cells"
                :key="cell.__uid"
                :cell="cell"
                :index="i"
                :total="config.cells.length"
                :all-cells="config.cells"
                :is-duplicate="duplicateIds.indexOf(cell.id) >= 0"
                :expanded-set="expandedSet"
                @toggle="onToggle"
                @remove="removeCell"
                @move-up="moveUp"
                @move-down="moveDown"
                @copy-id="copyId"
                @change="schedulePreview"
              ></cell-card>
            </div>
          </template>
        </drawer>

        <!-- 导入弹窗 -->
        <modal
          v-model="showImportModal"
          title="导入 JSON"
          width="700"
          :mask-closable="false"
          :loading="importing"
          ok-text="导入"
          cancel-text="取消"
          @on-ok="doImport"
        >
          <i-input
            v-model="importText"
            type="textarea"
            :rows="18"
            placeholder='粘贴 JSON，格式：{"title":"...","cells":[...]}'
            class="json-modal-textarea"
          />
          <div v-if="importError" style="color:#ed4014;margin-top:8px;font-size:12px;">{{importError}}</div>
        </modal>

        <!-- 使用说明弹窗 -->
        <modal v-model="showHelpModal" title="使用说明" width="720" footer-hide class="help-modal">
          <div class="help-content">
            <h3>① 坐标系统</h3>
            <p>每个单元格用 <code>x</code>（列）和 <code>y</code>（行）定位，从 1 开始。</p>
            <ul>
              <li>单个位置：<code>x: "1"</code>、<code>y: "3"</code></li>
              <li>合并多列：<code>x: "1,3"</code> 表示列 1-3 合并</li>
              <li>合并多行：<code>y: "3,5"</code> 表示行 3-5 合并</li>
              <li>跨行跨列：<code>x: "1,3" y: "3,5"</code> = 9 格合并</li>
            </ul>

            <h3>② 单元格类型（9 种）</h3>
            <ul>
              <li><b>label</b>：表头/标题（粗体背景）</li>
              <li><b>text</b>：静态文字（可含 <code>&lt;b&gt;</code> 加粗）</li>
              <li><b>input / number</b>：单行文本 / 数字输入</li>
              <li><b>select / radio / checkbox</b>：下拉 / 单选 / 多选（需配 <code>options</code>）</li>
              <li><b>date / upload</b>：日期 / 附件上传</li>
              <li><b>formula</b>：公式计算（只读展示）</li>
            </ul>

            <h3>③ 校验规则（validation.rules）</h3>
            <p>每条规则独立，可叠加。常用字段：</p>
            <ul>
              <li><code>required: true</code> + <code>message</code>：必填</li>
              <li><code>type: "number"</code> + <code>min</code>/<code>max</code>：数值范围</li>
              <li><code>type: "array"</code> + <code>min</code>：checkbox/upload 至少 N 项</li>
              <li><code>pattern: "^\d+$"</code>：正则匹配</li>
              <li><code>enumStr: "A,B,C"</code>：枚举值（逗号分隔，自动转 enum）</li>
              <li><code>custom: "value >= bm && value <= bl"</code>：表达式校验</li>
              <li><code>depends: "bm_r42 != null"</code>：依赖条件（条件不满足跳过校验）</li>
              <li><code>validator: "return value !== ''"</code>：函数体（参数 value/fm/extra）</li>
            </ul>

            <h3>④ 联动（linkage）</h3>
            <p>当某个 cell 的值变化时触发动作。结构：<code>trigger</code>（触发值）→ <code>actions</code>（动作列表）</p>
            <ul>
              <li>单格动作：<code>show/hide/enable/disable/clear/setValue</code> + <code>target</code></li>
              <li>行级动作：<code>rowEnable/rowDisable/rowClear</code> + <code>rowTargets</code>（一次操作多列）</li>
            </ul>

            <h3>⑤ 事件（events）<span style="font-size:11px;color:#2d8cf0;font-weight:normal;"> 新</span></h3>
            <p>每个控件 cell 可配 <code>events</code> 字段，在值变化/失焦/输入时执行任意 JS 函数体。比 linkage 更灵活，能写跨字段重算、格式化、条件赋值等。</p>
            <ul>
              <li><code>onChange</code>：值变化后触发（所有控件通用）</li>
              <li><code>onBlur</code>：失焦时触发（仅 input）</li>
              <li><code>onInput</code>：输入中触发（仅 input，高频慎用）</li>
            </ul>
            <p>函数体签名 <code>(value, fm, extra, rawEvent)</code>：</p>
            <ul>
              <li><code>value</code>：当前字段的新值（已存入 fm[id]）</li>
              <li><code>fm.字段ID</code>：读写整个表单 model（如 <code>fm.total = Number(fm.a) + Number(fm.b)</code>）</li>
              <li><code>extra</code>：<code>{ cell, cellMap }</code>（cell 配置对象 + 所有 cell 字典）</li>
              <li><code>rawEvent</code>：iView 组件原生事件参数 ——<br>
                <span style="font-size:11px;color:#888;padding-left:14px;">
                  input-number/select/radio/checkbox：<code>选中值</code>；<br>
                  date：<code>{ date: Date对象, label: 'date' }</code>；<br>
                  input on-blur：原生 <code>FocusEvent</code>；<br>
                  input onInput：<code>输入字符串</code>
                </span>
              </li>
            </ul>
            <pre style="background:#f6f8fa;padding:8px;border-radius:3px;font-size:11px;overflow-x:auto;"><code>// 跨字段重算
events: {
  onChange: "fm.total = (Number(fm.a) || 0) + (Number(fm.b) || 0)",
  onBlur: "fm.indval_r3 = (fm.indval_r3 || '').trim()"
}

// 拿原生参数：date-picker 选日期
events: {
  onChange: "fm.date_str = rawEvent.date ? rawEvent.date.toISOString() : ''"
}</code></pre>

            <h3>⑥ 列宽权重（width）<span style="font-size:11px;color:#2d8cf0;font-weight:normal;"> 新</span></h3>
            <p>每个第一行单列 cell 可配 <code>width</code> 字段（数字，作为权重）。列宽计算规则：</p>
            <ul>
              <li>列权重 = 第一行 cell 的 <code>width</code> 字段 &gt; 表头匹配 <code>FIXED_COL_RULES</code>（序号/编号 4，一/二/三级指标 6，评分规则 6，分值/得分 5）&gt; 0（参与剩余均分）</li>
              <li>有权重的列按权重值占位，没权重的列均分剩余空间</li>
              <li><b>归一化</b>：所有<b>可见列</b>宽度之和始终 = 100%。列被隐藏时，原本分给它的宽度按比例补给可见列</li>
            </ul>
            <pre style="background:#f6f8fa;padding:8px;border-radius:3px;font-size:11px;overflow-x:auto;"><code>// 让某列占 15% 权重
{ id: "c1", x: "1", y: "1", type: "label", content: "指标", width: 15 }</code></pre>

            <h3>⑦ 公式（formula.calculationFormula）</h3>
            <ul>
              <li><code>SUM(c6, e5, f5)</code>：求和（text 类型取 content 数字）</li>
              <li><code>AVG(c6, e5)</code>：平均（保留 2 位小数）</li>
              <li><code>MIN(c6, e5)</code>：最小值</li>
              <li><code>CALC_SCORE</code>：所有 number cell 求和</li>
              <li><code>CALC(Math.max(0, bm - bl))</code>：表达式（cell id 直接引用）</li>
            </ul>

            <h3>⑧ 隐藏 / 禁用</h3>
            <ul>
              <li><code>portalHide: true</code>：企业端隐藏</li>
              <li><code>platformHide: true</code>：管理端隐藏</li>
              <li><code>_hidden: true</code>：双端都隐藏（调试用）</li>
              <li><code>disabled: true</code>：只读（控件禁用）</li>
              <li>整列无可见 cell 时自动 collapse；整行无可见 cell 时整行不渲染</li>
            </ul>

            <h3>⑨ 推荐工作流</h3>
            <ol>
              <li>载入示例或从模板添加几个 cell</li>
              <li>右侧预览表格，点徽章可快速定位编辑</li>
              <li>切换企业端/管理端预览，验证隐藏效果</li>
              <li>填值 → 提交，控制台查看输出 JSON</li>
              <li>导出 JSON 给后端</li>
            </ol>
          </div>
        </modal>

        <!-- 批量操作：插入/删除列行 -->
        <modal v-model="showInsertColModal" title="插入列" width="420"
               ok-text="插入" cancel-text="取消" @on-ok="confirmInsertCol">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span>在第</span>
            <input-number v-model="insertColAt" :min="1" :max="maxX + 1" :step="1" size="small" style="width:90px;" />
            <span>列前插入</span>
            <input-number v-model="insertColCount" :min="1" :max="20" :step="1" size="small" style="width:80px;" />
            <span>列</span>
          </div>
          <div style="margin-top:12px;font-size:12px;color:#888;">
            坐标平移规则：插入点后的单元格整体右移；跨越插入点的合并单元格扩展范围（colspan +N）。<br>
            新列为空位（点击空位上的 + 添加单元格）。支持 Ctrl+Z 撤销。
          </div>
        </modal>

        <modal v-model="showInsertRowModal" title="插入行" width="420"
               ok-text="插入" cancel-text="取消" @on-ok="confirmInsertRow">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span>在第</span>
            <input-number v-model="insertRowAt" :min="1" :max="maxY + 1" :step="1" size="small" style="width:90px;" />
            <span>行前插入</span>
            <input-number v-model="insertRowCount" :min="1" :max="20" :step="1" size="small" style="width:80px;" />
            <span>行</span>
          </div>
          <div style="margin-top:12px;font-size:12px;color:#888;">
            同插入列规则（行方向）。新行为空位（点击空位上的 + 添加单元格）。支持 Ctrl+Z 撤销。
          </div>
        </modal>

        <modal v-model="showAppendColModal" title="追加列（末尾）" width="420"
               ok-text="追加" cancel-text="取消" @on-ok="confirmAppendCol">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span>在末尾追加</span>
            <input-number v-model="appendColCount" :min="1" :max="20" :step="1" size="small" style="width:80px;" />
            <span>列（当前共 {{ maxX }} 列）</span>
          </div>
          <div style="margin-top:12px;font-size:12px;color:#888;">
            在表格末尾追加空位列（点击空位上的 + 添加单元格）。与插入列行为一致。<br>
            支持 Ctrl+Z 撤销。
          </div>
        </modal>

        <modal v-model="showAppendRowModal" title="追加行（末尾）" width="420"
               ok-text="追加" cancel-text="取消" @on-ok="confirmAppendRow">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span>在末尾追加</span>
            <input-number v-model="appendRowCount" :min="1" :max="50" :step="1" size="small" style="width:80px;" />
            <span>行（当前共 {{ maxY }} 行）</span>
          </div>
          <div style="margin-top:12px;font-size:12px;color:#888;">
            在表格末尾追加空位行（点击空位上的 + 添加单元格）。与插入行行为一致。<br>
            支持 Ctrl+Z 撤销。
          </div>
        </modal>

        <modal v-model="showDeleteColModal" title="删除列" width="420"
               ok-text="删除" cancel-text="取消" @on-ok="confirmDeleteCol">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span>删除第</span>
            <input-number v-model="deleteColAt" :min="1" :max="maxX" :step="1" size="small" style="width:90px;" />
            <span>列</span>
          </div>
          <div style="margin-top:12px;font-size:12px;color:#ed4014;">
            ⚠ 独占该列的单元格会被移除；跨越该列的合并单元格范围缩 1；该列后的单元格左移。<br>
            建议 Ctrl+Z 撤销。
          </div>
        </modal>

        <modal v-model="showDeleteRowModal" title="删除行" width="420"
               ok-text="删除" cancel-text="取消" @on-ok="confirmDeleteRow">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span>删除第</span>
            <input-number v-model="deleteRowAt" :min="1" :max="maxY" :step="1" size="small" style="width:90px;" />
            <span>行</span>
          </div>
          <div style="margin-top:12px;font-size:12px;color:#ed4014;">
            ⚠ 独占该行的单元格会被移除；跨越该行的合并单元格范围缩 1；该行后的单元格上移。<br>
            联动规则中的行号会自动同步调整。建议 Ctrl+Z 撤销。
          </div>
        </modal>

        <!-- 批量列可见性弹窗 -->
        <modal v-model="showColVisModal" title="批量设置列可见性" width="520"
               ok-text="应用" cancel-text="取消" @on-ok="confirmColVis">
          <div style="margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span>选择列：</span>
            <i-select v-model="colVisCol" size="small" style="width:220px;">
              <i-option v-for="col in colList" :key="col.num" :value="col.num">
                第 {{col.num}} 列（{{col.count}} 个单元格）
              </i-option>
            </i-select>
          </div>
          <div style="margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span>设置为：</span>
            <radio-group v-model="colVisAction" size="small">
              <radio label="visible"><span>双端可见</span></radio>
              <radio label="portalHide"><span>门户隐藏</span></radio>
              <radio label="platformHide"><span>管理端隐藏</span></radio>
              <radio label="allHide"><span>全部隐藏</span></radio>
            </radio-group>
          </div>
          <div v-if="colVisCol" style="font-size:12px;color:#888;line-height:1.6;">
            当前第 {{colVisCol}} 列状态（按起始列归类，跨列合并单元格归到起始列）：<br>
            <span v-for="c in colVisCells" :key="c.__uid" style="margin-right:8px;">
              <span :style="{color: c.portalHide && c.platformHide ? '#999' : c.portalHide ? '#ed4014' : c.platformHide ? '#ff9900' : '#19be6b'}">{{c.id || '(未命名)'}}</span>
              <span style="color:#aaa;">{{c.portalHide && c.platformHide ? '[全部隐藏]' : c.portalHide ? '[门户隐藏]' : c.platformHide ? '[管理端隐藏]' : '[可见]'}}</span>
            </span>
          </div>
          <div style="margin-top:8px;font-size:12px;color:#888;">支持 Ctrl+Z 撤销。</div>
        </modal>

        <!-- 导出弹窗 -->
        <modal v-model="showExportModal" title="导出 JSON" width="700" footer-hide>
          <div style="margin-bottom:8px;display:flex;gap:8px;align-items:center;">
            <i-button size="small" @click="copyExport">复制</i-button>
            <i-button size="small" @click="exportFile">下载</i-button>
            <i-switch v-model="minifyExport" size="small" />
            <span style="font-size:12px;color:#888;">压缩为一行</span>
            <span style="flex:1"></span>
            <span style="font-size:12px;color:#888;">{{exportSize}}</span>
          </div>
          <i-input
            :value="exportText"
            type="textarea"
            :rows="22"
            readonly
            class="json-modal-textarea"
          />
        </modal>

        <!-- 模板选择弹窗 -->
        <modal
          v-model="showTemplateModal"
          title="选择单元格模板"
          width="640"
          :mask-closable="true"
          footer-hide
        >
          <div class="template-grid">
            <div
              v-for="t in cellTemplates"
              :key="t.key"
              class="template-card"
              @click="addFromTemplate(t)"
            >
              <div class="template-icon">{{t.icon}}</div>
              <div class="template-name">{{t.name}}</div>
              <div class="template-desc">{{t.desc}}</div>
            </div>
          </div>
          <div style="margin-top:12px;font-size:12px;color:#888;text-align:center;">
            创建后会自动定位到下一个空位（x:1, y:{{maxY + 1}}），可在抽屉里改坐标
          </div>
        </modal>
      </div>
    </script>

    <!-- ==================== 单元格卡片模板 ==================== -->
    <script type="text/x-template" id="cell-card-tpl">
      <div class="cell-card" :class="{ expanded: isExpanded, 'has-error': isDuplicate || !cell.id }"
           :data-cell-id="cell.id">
        <div class="cell-header" @click="$emit('toggle', cell.__uid)">
          <span class="cell-toggle">▶</span>
          <span class="cell-id-tag" :class="{ duplicate: isDuplicate, empty: !cell.id }">
            {{cell.id || '(未命名)'}}
          </span>
          <span class="cell-type-tag" :class="cell.type">{{typeLabel}}</span>
          <span class="cell-coord">x:{{cell.x}} y:{{cell.y}}</span>
          <span class="cell-preview" v-html="previewText"></span>
          <span class="cell-actions" @click.stop>
            <i-button size="small" @click="$emit('move-up', index)" :disabled="index === 0">↑</i-button>
            <i-button size="small" @click="$emit('move-down', index)" :disabled="index === total - 1">↓</i-button>
            <i-button size="small" @click="$emit('copy-id', cell.id)" :disabled="!cell.id">复制 ID</i-button>
            <i-button size="small" type="error" ghost @click="$emit('remove', index)">删</i-button>
          </span>
        </div>

        <div class="cell-body" v-show="isExpanded" @change="$emit('change')">
          <!-- 基础字段 -->
          <div class="field-grid">
            <div>
              <label class="field-label">ID</label>
              <i-input v-model="cell.id" size="small" placeholder="唯一标识，如 h1 / c8_benchmark" />
            </div>
            <div>
              <label class="field-label">类型 type</label>
              <i-select v-model="cell.type" size="small" @on-change="onTypeChange">
                <i-option v-for="t in types" :value="t.v" :key="t.v">{{t.l}}</i-option>
              </i-select>
            </div>
            <div>
              <label class="field-label">&nbsp;</label>
              <div style="font-size:11px;color:#888;padding-top:6px;">{{typeHint}}</div>
            </div>
            <div>
              <label class="field-label">列坐标 x</label>
              <i-input v-model="cell.x" size="small" placeholder="如 1 或 3,5（合并多列）" />
            </div>
            <div>
              <label class="field-label">行坐标 y</label>
              <i-input v-model="cell.y" size="small" placeholder="如 1 或 1,2（合并多行）" />
            </div>
            <div>
              <label class="field-label">初始值 value</label>
              <i-input v-model="cell.value" size="small" placeholder="可选" />
            </div>
            <div class="full">
              <label class="field-label">显示内容 content（支持 HTML）</label>
              <i-input v-model="cell.content" type="textarea" :rows="2" size="small" placeholder="label/text 显示的文本；select/radio 的提示文字" />
            </div>
            <div class="full" v-if="hasPlaceholder">
              <label class="field-label">占位提示 placeholder</label>
              <i-input v-model="cell.placeholder" size="small" placeholder="输入框/数字框的占位提示" />
            </div>
            <div class="full" v-if="cell.type === 'number'">
              <label class="field-label">数字精度 precision</label>
              <i-select v-model="cell.precision" size="small" style="width:100%">
                <i-option :value="null">不限（可整数可小数）</i-option>
                <i-option :value="0">仅整数</i-option>
                <i-option :value="1">小数 1 位</i-option>
                <i-option :value="2">小数 2 位</i-option>
                <i-option :value="3">小数 3 位</i-option>
                <i-option :value="4">小数 4 位</i-option>
              </i-select>
              <div style="font-size:11px;color:#888;padding-top:2px;">控制输入框是否允许小数及小数位数。仅整数：禁止小数；小数 N 位：自动 round 到 N 位</div>
            </div>
            <div v-if="cell.type === 'label' || cell.type === 'text'">
              <label class="field-label">溢出隐藏 clampLines</label>
              <input-number v-model="cell.clampLines" size="small" :min="0" :step="1" placeholder="0" style="width:100%" />
              <div style="font-size:11px;color:#888;padding-top:2px;">0 或空 = 全部显示；N = 截断到 N 行（鼠标悬停看完整）</div>
            </div>
            <div v-if="isFirstRowCell">
              <label class="field-label">列宽权重 width</label>
              <input-number v-model="cell.width" size="small" :min="0" :step="1" placeholder="留空" style="width:100%" />
              <div style="font-size:11px;color:#888;padding-top:2px;">配置后作为该列权重参与列宽计算，所有可见列权重和 = 100%</div>
            </div>
          </div>

          <!-- 类型相关 -->
          <!-- options -->
          <div class="field-group" v-if="hasOptions">
            <div class="field-group-title">
              选项 options
              <span class="badge-count">{{(cell.options || []).length}}</span>
              <i-button class="add-btn" size="small" type="primary" ghost @click="addOption">+ 添加选项</i-button>
            </div>
            <div class="sub-list">
              <div class="sub-item" v-for="(opt, i) in (cell.options || [])" :key="i">
                <div class="row-grow">
                  <i-input v-model="opt.label" size="small" placeholder="显示文字" />
                  <i-input v-model="opt.value" size="small" placeholder="值 value" style="max-width:140px;" />
                  <input-number v-model="opt.score" size="small" placeholder="分值（选填）" :step="0.1" style="max-width:120px;" />
                </div>
                <i-button class="sub-remove" size="small" type="error" ghost @click="removeOption(i)">×</i-button>
              </div>
              <div v-if="!(cell.options && cell.options.length)" style="color:#999;font-size:12px;">尚未配置选项</div>
            </div>
          </div>

          <!-- formula -->
          <div class="field-group" v-if="cell.type === 'formula'">
            <div class="field-group-title">公式 calculationFormula</div>
            <i-input v-model="cell.calculationFormula" type="textarea" :rows="2" size="small" placeholder="如 SUM(c6,e5,f5) 或 CALC(Math.max(0, bm-bl))" />
            <div class="expr-chips">
              <span class="expr-chip tpl" @click="insertFormula('SUM()')">SUM()</span>
              <span class="expr-chip tpl" @click="insertFormula('AVG()')">AVG()</span>
              <span class="expr-chip tpl" @click="insertFormula('MIN()')">MIN()</span>
              <span class="expr-chip tpl" @click="insertFormula('CALC_SCORE')">CALC_SCORE</span>
              <span class="expr-chip tpl" @click="insertFormula('CALC()')">CALC()</span>
            </div>
            <div class="expr-hint">单元格 id 可在预览徽章或列表抽屉里查看。CALC 内可用 Math.max/Math.round/三元表达式。</div>
          </div>

          <!-- upload -->
          <div class="field-group" v-if="cell.type === 'upload'">
            <div class="field-group-title">上传配置</div>
            <div class="field-grid-2">
              <div>
                <label class="field-label">允许格式 accept</label>
                <i-input v-model="cell.accept" size="small" placeholder=".pdf,.jpg,.png" />
              </div>
              <div>
                <label class="field-label">最大体积 maxSize (MB)</label>
                <input-number v-model="cell.maxSize" size="small" :min="0" :step="1" style="width:100%" />
              </div>
              <div class="full" style="grid-column: 1 / -1;">
                <div class="rule-help" style="margin-top:2px;">
                  <b>accept</b>=允许的文件后缀（逗号分隔）；<b>maxSize</b>=单文件大小上限（MB），超出会拒绝上传。校验"至少上传 N 个"在校验规则里配 array + min。
                </div>
              </div>
            </div>
          </div>

          <!-- 校验 validation -->
          <div class="field-group" v-if="hasValidation">
            <div class="field-group-title">
              校验规则 validation.rules
              <span class="badge-count">{{(cell.validation && cell.validation.rules || []).length}}</span>
              <i-button class="add-btn" size="small" type="primary" ghost @click="addRule">+ 添加规则</i-button>
              <i-checkbox v-model="advancedRules" style="margin-left:8px;">
                <span style="font-size:11px;color:#888;">高级（string/pattern/enum/custom…）</span>
              </i-checkbox>
            </div>
            <div class="sub-list">
              <div class="sub-item sub-item-vertical" v-for="(r, i) in validationRules" :key="i">
                <div class="row-grow">
                  <i-select v-model="r.kind" size="small" style="width:140px;flex:0 0 140px;" @on-change="onRuleKindChange(r)">
                    <i-option value="required">必填 required</i-option>
                    <i-option value="number">数值范围 min/max</i-option>
                    <i-option value="array">数组长度 array</i-option>
                    <template v-if="advancedRules">
                      <i-option value="string">长度 min/max</i-option>
                      <i-option value="pattern">正则 pattern</i-option>
                      <i-option value="len">定长 len</i-option>
                      <i-option value="enum">枚举 enum</i-option>
                      <i-option value="custom">自定义 custom 表达式</i-option>
                      <i-option value="validator">validator 函数体</i-option>
                      <i-option value="depends">条件必填 depends</i-option>
                    </template>
                  </i-select>
                  <i-input v-model="r.message" size="small" placeholder="错误提示文字" style="flex:1;" />
                  <i-button class="sub-remove" size="small" type="error" ghost @click="removeRule(i)">×</i-button>
                </div>
                <!-- 说明：根据 kind 显示对应解释 -->
                <div class="rule-help" v-if="r.kind === 'required'">
                  必填校验。<b>普通必填</b>=勾选后该字段始终必填；<b>动态条件必填</b>=填写表达式（可访问 <code>fm.字段ID</code> 引用其他字段值），表达式为真时才校验。
                </div>
                <div class="rule-help" v-if="r.kind === 'number'">
                  数值范围。仅对 <code>number</code> 类型字段生效。min/max 限定数字大小，任一可留空（如只填 min 则只校验下限）。
                </div>
                <div class="rule-help" v-if="r.kind === 'array'">
                  数组长度校验。对 <code>checkbox</code> 多选 / <code>upload</code> 上传生效。<b>min</b>=至少选 N 个/上传 N 个，<b>max</b>=最多 N 个。
                </div>
                <div class="rule-help" v-if="r.kind === 'string'">
                  字符串长度校验。对 <code>input</code> 生效。min/max 限定字符数（min=最短，max=最长），任一可留空。
                </div>
                <div class="rule-help" v-if="r.kind === 'pattern'">
                  正则校验。填写 JS 正则字符串（不带斜杠），值必须匹配整个正则。
                </div>
                <div class="rule-help" v-if="r.kind === 'len'">
                  定长校验。值的长度必须精确等于 len（如身份证 18 位、手机号 11 位）。
                </div>
                <div class="rule-help" v-if="r.kind === 'enum'">
                  枚举校验。值必须在下列出的枚举值之内，逗号分隔（如 <code>A,B,C</code>）。多用于 select/radio。
                </div>
                <div class="rule-help" v-if="r.kind === 'custom'">
                  自定义表达式校验。可访问 <code>value</code>（当前字段值）和 <code>fm.字段ID</code>（其他字段值），表达式为真=校验通过。常用于跨字段联动校验。
                </div>
                <div class="rule-help" v-if="r.kind === 'validator'">
                  自定义函数体。填写 JS 函数体，参数 <code>(value, fm, extra)</code>，<code>return true</code>=校验通过，<code>return false</code> 或抛错=失败。最灵活，可写复杂逻辑。
                </div>
                <div class="rule-help" v-if="r.kind === 'depends'">
                  条件必填。填写表达式（可访问 <code>fm.字段ID</code>），表达式为真时该字段才必填。等同于 required 的"动态条件必填"模式，但独立配置更灵活。
                </div>
                <!-- kind=required：两种模式 —— 普通必填 / 动态条件必填（生产格式 required 为字符串） -->
                <div class="row-grow" v-if="r.kind === 'required'">
                  <radio-group
                    :value="getRequiredMode(r)"
                    @on-change="v => setRequiredMode(r, v)"
                    size="small"
                    type="button">
                    <radio label="bool"><span>普通必填 required:true</span></radio>
                    <radio label="expr"><span>动态条件必填 required:'表达式'</span></radio>
                  </radio-group>
                </div>
                <div class="row-grow" v-if="r.kind === 'required' && getRequiredMode(r) === 'bool'">
                  <i-checkbox :value="r.required === true" @on-change="v => setRequiredBool(r, v)">
                    <span style="font-size:12px;color:#888;">勾选后此字段为必填（生产默认勾选）</span>
                  </i-checkbox>
                </div>
                <div class="sub-item-vertical" v-if="r.kind === 'required' && getRequiredMode(r) === 'expr'">
                  <div class="row-grow">
                    <span style="font-size:12px;color:#888;flex-shrink:0;width:110px;">required 条件</span>
                    <span style="font-size:11px;color:#aaa;flex-shrink:0;">truthy 时必填</span>
                  </div>
                  <i-input
                    type="textarea"
                    :rows="2"
                    :value="typeof r.required === 'string' ? r.required : ''"
                    @input="v => setRequiredExpr(r, v)"
                    size="small"
                    placeholder="如 fm.indval_r3 != null && fm.indval_r3 != ''" />
                </div>
                <!-- kind=number/array：min/max -->
                <div class="row-grow" v-if="r.kind === 'number' || r.kind === 'array' || (advancedRules && (r.kind === 'string'))">
                  <input-number v-model="r.min" size="small" placeholder="min" style="flex:1;" />
                  <input-number v-model="r.max" size="small" placeholder="max" style="flex:1;" />
                </div>
                <!-- trigger：仅 required 和 array 用（mock 数据规律） -->
                <div class="row-grow" v-if="r.kind === 'required' || r.kind === 'array'">
                  <span style="font-size:12px;color:#888;flex-shrink:0;">触发时机 trigger</span>
                  <i-select v-model="r.trigger" size="small" clearable style="width:140px;flex:0 0 140px;" placeholder="默认=blur">
                    <i-option value="change">change</i-option>
                    <i-option value="blur">blur</i-option>
                  </i-select>
                  <span style="font-size:11px;color:#aaa;flex:1;">生产数据常见 trigger:'change'</span>
                </div>
                <!-- 以下为高级规则字段（advancedRules 开启时才显示） -->
                <div class="row-grow" v-if="advancedRules && r.kind === 'enum'">
                  <i-input v-model="r.enumStr" size="small" placeholder='枚举值，逗号分隔，如 A,B,C' style="flex:1;" @on-change="syncEnum(r)" />
                </div>
                <div class="row-grow" v-if="advancedRules && r.kind === 'pattern'">
                  <i-input v-model="r.pattern" size="small" placeholder='如 ^\d+$' style="flex:1;" />
                </div>
                <div class="row-grow" v-if="advancedRules && r.kind === 'len'">
                  <input-number v-model="r.len" size="small" placeholder="长度" style="flex:1;" />
                </div>
                <div class="sub-item-vertical" v-if="advancedRules && r.kind === 'custom'">
                  <i-input v-model="r.custom" type="textarea" :rows="2" size="small" placeholder='表达式，如 value >= bm && value <= bl' />
                </div>
                <div class="sub-item-vertical" v-if="advancedRules && r.kind === 'validator'">
                  <i-input v-model="r.validator" type="textarea" :rows="3" size="small" placeholder='函数体，参数 (value, fm, extra)，return true 校验通过' />
                </div>
                <div class="sub-item-vertical" v-if="advancedRules && r.kind === 'depends'">
                  <i-input v-model="r.depends" type="textarea" :rows="2" size="small" placeholder='条件表达式，如 bm_r42 != null' />
                </div>
                <div class="sub-item-vertical" v-if="advancedRules && (r.kind === 'custom' || r.kind === 'validator')">
                  <i-checkbox v-model="r.useDepends">附加条件 depends</i-checkbox>
                  <i-input v-show="r.useDepends" v-model="r.depends" type="textarea" :rows="2" size="small" placeholder="depends 表达式" />
                </div>
              </div>
              <div v-if="!validationRules.length" style="color:#999;font-size:12px;">尚未配置校验规则</div>
            </div>
          </div>

          <!-- 联动 linkage -->
          <div class="field-group" v-if="hasLinkage">
            <div class="field-group-title">
              联动 linkage
              <span class="badge-count">{{(cell.linkage || []).length}}</span>
              <i-button class="add-btn" size="small" type="primary" ghost @click="addLinkage">+ 添加触发</i-button>
            </div>
            <div class="sub-list">
              <div class="sub-item sub-item-vertical" v-for="(lk, li) in (cell.linkage || [])" :key="li">
                <div class="row-grow">
                  <span style="font-size:12px;color:#888;flex-shrink:0;">当选择</span>

        <i-select v-if="cell.type==='select'"

          @on-change="val => { $emit('set-val', cell.id, val); $emit('on-change', cell.id, val); }"

            <radio v-for="opt in (cell.options||[])" :label="opt.value" :key="opt.value" :disabled="disabled">

        </div>
        <checkbox-group v-if="cell.type==='checkbox'"

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.min.js"></script>
    <script>
      if (!window.Vue)
        document.write(
          '<script src="https://unpkg.com/vue@2.7.16/dist/vue.min.js"><\/script>'
        );
    </script>
    <script src="https://cdn.jsdelivr.net/npm/view-design@4.7.0/dist/iview.min.js"></script>
    <script>
      if (!window.iview)
        document.write(
          '<script src="https://unpkg.com/view-design@4.7.0/dist/iview.min.js"><\/script>'
        );
    </script>
    <script>
      /* ====================================================================
       * 动态表格工具函数 —— 单文件分发，内联于此
       * 与生产组件 dynamic-eval-table.vue / 单文件 dynamic-table-utils.js 保持逻辑一致
       * 修改本块时请同步更新另两处（或仅更新 dynamic-table-utils.js 再粘贴回来）
       * ==================================================================== */
      function _DTUtilsFactory() {
        function parseRange(v) {
          var p = String(v).split(',').map(Number);
          var mn = Math.min.apply(null, p);
          var mx = Math.max.apply(null, p);
          return { start: mn, end: mx, span: mx - mn + 1 };
        }
        function buildFormModel(cells) {
          var m = {};
          (cells || []).forEach(function (c) {
            if (!c || !c.id) return;
            if (c.type === 'number') {
              m[c.id] = c.value != null && c.value !== '' ? Number(c.value) : null;
            } else if (c.type === 'checkbox') {
              m[c.id] = Array.isArray(c.value) ? c.value : [];
            } else if (['input', 'select', 'radio', 'date', 'upload'].indexOf(c.type) >= 0) {
              m[c.id] = c.value != null ? c.value : '';
            }
          });
          return m;
        }
        function buildGrid(cells) {
          var safeCells = cells || [];
          var cellMap = {};
          safeCells.forEach(function (c) { cellMap[c.id] = c; });
          var maxC = 0, maxR = 0;
          safeCells.forEach(function (c) {
            var xr = parseRange(c.x), yr = parseRange(c.y);
            if (xr.end > maxC) maxC = xr.end;
            if (yr.end > maxR) maxR = yr.end;
          });
          var G = [], O = [];
          for (var r = 0; r < maxR; r++) {
            G[r] = []; O[r] = [];
            for (var c = 0; c < maxC; c++) { G[r][c] = null; O[r][c] = false; }
          }
          var sorted = safeCells.slice().sort(function (a, b) {
            return parseRange(b.y).span * parseRange(b.x).span -
                   parseRange(a.y).span * parseRange(a.x).span;
          });
          sorted.forEach(function (cell) {
            var xr = parseRange(cell.x), yr = parseRange(cell.y);
            var r0 = yr.start - 1, c0 = xr.start - 1;
            if (r0 < 0 || c0 < 0) return;
            var entry = { cell: cell, rowspan: yr.span, colspan: xr.span, alts: null };
            if (G[r0][c0]) {
              if (!G[r0][c0].alts) G[r0][c0].alts = [];
              G[r0][c0].alts.push(entry);
              return;
            }
            G[r0][c0] = entry;
            for (var r = r0; r < r0 + yr.span && r < maxR; r++) {
              for (var c = c0; c < c0 + xr.span && c < maxC; c++) {
                if (!(r === r0 && c === c0)) O[r][c] = true;
              }
            }
          });
          var rows = [];
          for (var r = 0; r < maxR; r++) {
            var cols = [];
            for (var c = 0; c < maxC; c++) {
              if (O[r][c]) { cols.push({ skip: true }); continue; }
              var e = G[r][c];
              if (!e) { cols.push({ skip: false, cell: null }); continue; }
              var isCtrl = ['input', 'number', 'select', 'radio', 'checkbox', 'date', 'upload']
                .indexOf(e.cell.type) >= 0;
              var cls = [];
              if (e.cell.type === 'text' && (c === 0 || c === 2) && /<b>/.test(e.cell.content || '')) {
                cls.push('cell-group');
              }
              cols.push({
                skip: false, cell: e.cell, rowspan: e.rowspan, colspan: e.colspan, alts: e.alts || [],
                isLabel: e.cell.type === 'label', isText: e.cell.type === 'text',
                isControl: isCtrl, isFormula: e.cell.type === 'formula', cls: cls.join(' ')
              });
            }
            rows.push(cols);
          }
          return { rows: rows, cellMap: cellMap, maxC: maxC, maxR: maxR };
        }
        // 表达式编译缓存：cacheKey = kind + fmKeysSig + expr
        var _exprCache = {};
        function _buildLocals(fm) {
          return Object.keys(fm).map(function (k) {
            return 'var ' + k + '=fm[' + JSON.stringify(k) + '];';
          }).join('');
        }
        function _fmKeysSig(fm) {
          return Object.keys(fm).sort().join('|');
        }
        function _compile(kind, expr, fm, argList) {
          var sig = _fmKeysSig(fm);
          var cacheKey = kind + '|' + sig + '|' + expr;
          var fn = _exprCache[cacheKey];
          if (!fn) {
            var locals = _buildLocals(fm);
            fn = new Function(argList, locals + 'return(' + expr + ')');
            _exprCache[cacheKey] = fn;
          }
          return fn;
        }
        function evalDepends(expr, fm, extra) {
          if (!expr || typeof expr !== 'string' || !String(expr).trim()) return false;
          try {
            var fn = _compile('dep', expr, fm, 'fm,extra');
            return fn(fm, extra || {});
          } catch (e) {
            console.error('[evalDepends 失败]', expr, e);
            return false;
          }
        }
        function evalCustom(expr, value, fm, extra) {
          if (!expr || typeof expr !== 'string' || !String(expr).trim()) return false;
          try {
            var fn = _compile('cust', expr, fm, 'value,fm,extra');
            return fn(value, fm, extra || {});
          } catch (ex) {
            console.error('[evalCustom 失败]', expr, ex);
            return false;
          }
        }
        function evalMath(expr, scope) {
          if (!expr || typeof expr !== 'string') return null;
          try {
            var locals = Object.keys(scope || {}).map(function (k) {
              return 'var ' + k + '=' + JSON.stringify(scope[k]) + ';';
            }).join('');
            var fn = new Function('Math', locals + 'return(' + expr + ')');
            return fn(Math);
          } catch (e) {
            console.error('[evalMath 失败]', expr, e);
            return null;
          }
        }
        function evalEvent(fnBody, value, fm, extra, rawEvent) {

          checkOverlap: function (x, y, excludeUid) {
            if (!x || !y) return [];
            var xr, yr;
            try {
              xr = window.DTUtils.parseRange(x);
              yr = window.DTUtils.parseRange(y);
            } catch (e) { return []; }
            var conflicts = [];
            this.config.cells.forEach(function (c) {
              if (c.__uid === excludeUid) return;
              if (!c.x || !c.y) return;
              var cxr = window.DTUtils.parseRange(c.x);
              var cyr = window.DTUtils.parseRange(c.y);
              // 真正的冲突：x 和 y 范围完全一致（非部分重叠）
              // 部分重叠是合法的：合并单元格（y=16,18）包含单行单元格（y=17）属正常布局
              if (xr.start === cxr.start && xr.end === cxr.end &&
                  yr.start === cyr.start && yr.end === cyr.end) {
                conflicts.push(c);

          openEditDrawer: function (uid) {

            var idx = -1;
            for (var i = 0; i < this.config.cells.length; i++) {
              if (this.config.cells[i].__uid === uid) { idx = i; break; }
            }
            var orig = idx >= 0 ? this.config.cells[idx] : null;

          commitEditDrawer: function () {
            var i = this.editDrawerIndex;
            if (i >= 0 && this.editDrawerDraft) {
              var draft = this.editDrawerDraft;
              var cur = this.config.cells[i];
              var uid = cur.__uid;
              // 冲突检测 1：ID 不能与其他 cell 重复
              if (this.idExists(draft.id, uid)) {
                this.$Message.error('ID "' + draft.id + '" 已被其他单元格占用，请改用其他 ID');
                return;
              }
              // 冲突检测 2：x/y 范围与其他 cell 完全相同（坐标重叠）
              // 改成 warning 而非阻塞：用户可能确实需要多个同坐标 cell（如复制后再编辑），
              // 渲染层 buildGrid 的 alts 机制能正确处理，主 cell 显示、alts 进抽屉可编辑
              var overlaps = this.checkOverlap(draft.x, draft.y, uid);
              if (overlaps.length) {
                this.$Message.warning('坐标与 ' + overlaps.map(function (c) { return c.id; }).join(', ') + ' 相同（同坐标 cell 会进入 alts，渲染只显示首个）');
              }

              Object.keys(cur).forEach(function (k) { if (!(k in draft)) delete cur[k]; });

          doImport: function () {

                var validTypes = ['label', 'text', 'input', 'number', 'select', 'radio', 'checkbox', 'date', 'upload', 'formula'];
